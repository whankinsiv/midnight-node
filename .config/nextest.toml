[profile.ci.junit]  # this can be some other profile, too
path = "test-results-node.xml"

# Toolkit-js tests that invoke the JS CLI share a working directory where
# contract.config.ts is compiled to .js at runtime.  Running them in
# parallel causes a filesystem race on that generated file.
[test-groups.toolkit-js]
max-threads = 1

[[profile.ci.overrides]]
filter = "test(generate_intent)"
test-group = "toolkit-js"

# Contract E2E tests all fund from the same FUNDING_SEED against a shared node
# container; running them in parallel races on that wallet's UTXOs. Keep them serial.
[test-groups.contract-e2e]
max-threads = 1

[[profile.ci.overrides]]
filter = "test(bboard_private_witness_not_leaked) | test(counter_increment_e2e) | test(welcome_e2e) | test(tic_tac_toe_e2e)"
test-group = "contract-e2e"
