services:
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.1.4
    container_name: db-sync-cardano-node
    platform: linux/amd64
    environment:
      NETWORK: ${NETWORK:-mainnet}
    volumes:
      - node_data:/data
      - node_ipc:/ipc
    healthcheck:
      test: "test -S /ipc/node.socket"
      interval: 20s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  cardano-db-sync:
    image: ghcr.io/intersectmbo/cardano-db-sync:13.6.0.4
    container_name: db-sync-cardano-db-sync
    platform: linux/amd64
    depends_on:
      cardano-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NETWORK: ${NETWORK:-mainnet}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: cexplorer
      RESTORE_SNAPSHOT: ${RESTORE_SNAPSHOT:-}
      EXTRA_DB_SYNC_ARGS: ""
    volumes:
      - db_sync_data:/var/lib/cexplorer
      - node_ipc:/node-ipc
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: db-sync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: cexplorer
    shm_size: 1g
    command: postgres -c max_wal_size=4GB -c checkpoint_timeout=30min -c shared_buffers=512MB -c work_mem=256MB -c maintenance_work_mem=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  node_data:
  node_ipc:
  db_sync_data:
  postgres_data:
