name: "Publish to GHCR"
description: "Pulls the partner-chains-node Docker image from ECR and pushes it to GHCR with appropriate tags."

inputs:
  sha:
    description: "Commit SHA"
    required: true
  tag:
    description: "Release Tag"
    required: true

outputs: {}

runs:
  using: "composite"
  steps:
    - name: Acquire AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN_SECRET }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ECR_REGISTRY_SECRET }}

    - name: Pull Docker Image from ECR
      env:
        ECR_REGISTRY: ${{ env.ECR_REGISTRY_SECRET }}
        INPUT_SHA: ${{ inputs.sha }}
      run: |
        docker pull "$ECR_REGISTRY/partner-chains-node:$INPUT_SHA"
      shell: bash

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ env.ACTOR }}
        password: ${{ env.GITHUB_TOKEN }}

    - name: Tag Docker Image for GHCR
      env:
        ECR_REGISTRY: ${{ env.ECR_REGISTRY_SECRET }}
        GH_REPOSITORY: ${{ github.repository }}
        INPUT_SHA: ${{ inputs.sha }}
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        docker tag "$ECR_REGISTRY/partner-chains-node:$INPUT_SHA" "ghcr.io/$GH_REPOSITORY/partner-chains-node:latest"
        docker tag "$ECR_REGISTRY/partner-chains-node:$INPUT_SHA" "ghcr.io/$GH_REPOSITORY/partner-chains-node:$INPUT_SHA"
        docker tag "$ECR_REGISTRY/partner-chains-node:$INPUT_SHA" "ghcr.io/$GH_REPOSITORY/partner-chains-node:$INPUT_TAG"
      shell: bash

    - name: Push Tagged Images to GHCR
      env:
        GH_REPOSITORY: ${{ github.repository }}
        INPUT_SHA: ${{ inputs.sha }}
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        docker push "ghcr.io/$GH_REPOSITORY/partner-chains-node:latest"
        docker push "ghcr.io/$GH_REPOSITORY/partner-chains-node:$INPUT_SHA"
        docker push "ghcr.io/$GH_REPOSITORY/partner-chains-node:$INPUT_TAG"
      shell: bash
