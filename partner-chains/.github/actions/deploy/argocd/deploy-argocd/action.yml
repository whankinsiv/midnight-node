name: "Deploy ArgoCD Node"
description: "Deploys an ArgoCD node using a specified commit SHA."
inputs:
  sha:
    description: "Commit SHA"
    required: true

outputs: {}

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install kubectl and awscli
      run: |
        # Install kubectl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x ./kubectl
        sudo mv ./kubectl /usr/local/bin/kubectl

        # Install or update AWS CLI v2
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -o awscliv2.zip
        sudo ./aws/install --update
      shell: bash

    - name: Configure kubectl
      env:
        KUBECONFIG_BASE64: ${{ env.kubeconfig_base64 }}
        K8S_SERVER: ${{ env.K8S_SERVER }}
        K8S_SA_TOKEN: ${{ env.K8S_SA_TOKEN }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        echo "${KUBECONFIG_BASE64}" | base64 --decode > "$RUNNER_TEMP/kubeconfig.yaml"
        kubectl config set-cluster my-cluster --server=${K8S_SERVER} --insecure-skip-tls-verify=true
        kubectl config set-credentials github-actions --token=${K8S_SA_TOKEN}
        kubectl config set-context my-context --cluster=my-cluster --user=github-actions --namespace=default
        kubectl config use-context my-context
      shell: bash

    - name: Render and Apply Kubernetes Manifest
      env:
        INPUT_SHA: ${{ inputs.sha }}
      run: |
        sed "s|{{SHA}}|$INPUT_SHA|g; s|{{SUBSTRATE_NODE_IMAGE}}|689191102645.dkr.ecr.eu-central-1.amazonaws.com/substrate-node:$INPUT_SHA|g" .github/actions/deploy/argocd/manifest.yaml > "manifest-sha-$INPUT_SHA.yaml"
        kubectl apply -f "manifest-sha-$INPUT_SHA.yaml"
      shell: bash

    - name: Wait for Deployment to be Ready
      env:
        INPUT_SHA: ${{ inputs.sha }}
      run: |
        kubectl wait --for=condition=available "deployment/substrate-node-sha-$INPUT_SHA" -n integration-testing --timeout=5m
        kubectl rollout status "deployment/substrate-node-sha-$INPUT_SHA" -n integration-testing
      shell: bash

    - name: Upload Manifest as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: manifest-sha-${{ inputs.sha }}
        path: manifest-sha-${{ inputs.sha }}.yaml
