name: "Deploy staging-preview"
description: "Deploys the staging-preview environment with chain-spec and image override using Kubernetes and Helm."
inputs:
  image:
    description: "Node Image"
    required: true
  sha:
    description: "Git SHA"
    required: true
  no-wipe:
    description: "Skip PVC wipe step"
    required: false
    default: false

outputs: {}

runs:
  using: "composite"
  steps:
    - name: Checkout sidechains-infra-priv repo
      uses: actions/checkout@v4
      with:
        repository: input-output-hk/sidechains-infra-priv
        token: ${{ env.ACTIONS_PAT }}
        path: sidechains-infra-priv

    - name: Acquire AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN_SECRET }}
        aws-region: eu-central-1

    - name: Login to ECR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
      with:
        registry: ${{ env.ECR_REGISTRY_SECRET }}

    - name: Install kubectl, kubernetes-helm, and awscli
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x ./kubectl
        sudo mv ./kubectl /usr/local/bin/kubectl
        VERSION=$(curl --silent "https://api.github.com/repos/helm/helm/releases/latest" | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
        curl -L "https://get.helm.sh/helm-${VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
        tar -zxvf helm.tar.gz
        sudo mv linux-amd64/helm /usr/local/bin/helm
        rm -rf linux-amd64 helm.tar.gz
        sudo apt-get update
        sudo apt-get install -y python3-pip
        pip3 install awscli --upgrade
      shell: bash

    - name: Configure kubectl
      env:
        KUBECONFIG_BASE64: ${{ env.kubeconfig_base64 }}
        K8S_SERVER: ${{ env.K8S_SERVER }}
        K8S_SA_TOKEN: ${{ env.K8S_SA_TOKEN }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        echo "$KUBECONFIG_BASE64" | base64 --decode > "$RUNNER_TEMP/kubeconfig.yaml"
        kubectl config set-cluster my-cluster --server="$K8S_SERVER" --insecure-skip-tls-verify=true
        kubectl config set-credentials github-actions --token="$K8S_SA_TOKEN"
        kubectl config set-context my-context --cluster=my-cluster --user=github-actions --namespace=default
        kubectl config use-context my-context
      shell: bash

    - name: Delete pods
      continue-on-error: true
      run: |
        kubectl delete pod staging-preview-validator-1 -n staging-preview || true
        kubectl delete pod staging-preview-validator-2 -n staging-preview || true
        kubectl delete pod staging-preview-validator-3 -n staging-preview || true
        kubectl delete pod staging-preview-validator-4 -n staging-preview || true
        kubectl delete pod staging-preview-validator-5 -n staging-preview || true
        echo "Waiting for pods to delete..."
        kubectl wait --for=delete pod/staging-preview-validator-1 pod/staging-preview-validator-2 pod/staging-preview-validator-3 pod/staging-preview-validator-4 pod/staging-preview-validator-5 -n staging-preview --timeout=120s || true
      shell: bash

    - name: Delete substrate PVCs
      continue-on-error: true
      if: inputs.no-wipe != 'true'
      run: |
        kubectl delete pvc staging-preview-validator-1-claim-substrate-node-data -n staging-preview
        kubectl delete pvc staging-preview-validator-2-claim-substrate-node-data -n staging-preview
        kubectl delete pvc staging-preview-validator-3-claim-substrate-node-data -n staging-preview
        kubectl delete pvc staging-preview-validator-4-claim-substrate-node-data -n staging-preview
        kubectl delete pvc staging-preview-validator-5-claim-substrate-node-data -n staging-preview
        echo "Waiting for PVCs to delete..."
        kubectl wait --for=delete pvc/staging-preview-validator-1-claim-substrate-node-data pvc/staging-preview-validator-2-claim-substrate-node-data pvc/staging-preview-validator-3-claim-substrate-node-data pvc/staging-preview-validator-4-claim-substrate-node-data pvc/staging-preview-validator-5-claim-substrate-node-data -n staging-preview --timeout=120s
      shell: bash

    - name: Deploy with chain-spec and image override
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_SHA: ${{ inputs.sha }}
      run: |
        cd sidechains-infra-priv/src/kube/helm/partner-chains-node-chart/
        helm upgrade --install staging-preview-validator-1 . -f values/chains/staging-preview.yaml -f values/nodes/staging-preview/validator/staging-preview-validator-1 --set images.substrateNode="$INPUT_IMAGE" --set chain.chainspec_filename="staging-preview-chain-spec-$INPUT_SHA.json"
        helm upgrade --install staging-preview-validator-2 . -f values/chains/staging-preview.yaml -f values/nodes/staging-preview/validator/staging-preview-validator-2 --set images.substrateNode="$INPUT_IMAGE" --set chain.chainspec_filename="staging-preview-chain-spec-$INPUT_SHA.json"
        helm upgrade --install staging-preview-validator-3 . -f values/chains/staging-preview.yaml -f values/nodes/staging-preview/validator/staging-preview-validator-3 --set images.substrateNode="$INPUT_IMAGE" --set chain.chainspec_filename="staging-preview-chain-spec-$INPUT_SHA.json"
        helm upgrade --install staging-preview-validator-4 . -f values/chains/staging-preview.yaml -f values/nodes/staging-preview/validator/staging-preview-validator-4 --set images.substrateNode="$INPUT_IMAGE" --set chain.chainspec_filename="staging-preview-chain-spec-$INPUT_SHA.json"
        helm upgrade --install staging-preview-validator-5 . -f values/chains/staging-preview.yaml -f values/nodes/staging-preview/validator/staging-preview-validator-5 --set images.substrateNode="$INPUT_IMAGE" --set chain.chainspec_filename="staging-preview-chain-spec-$INPUT_SHA.json"
      shell: bash

    - name: Wait
      run: |
        echo "Waiting for staging-preview-validator-1..."
        kubectl wait --for=condition=ready pod staging-preview-validator-1 -n staging-preview --timeout=300s
        echo "Waiting for staging-preview-validator-2..."
        kubectl wait --for=condition=ready pod staging-preview-validator-2 -n staging-preview --timeout=300s
        echo "Waiting for staging-preview-validator-3..."
        kubectl wait --for=condition=ready pod staging-preview-validator-3 -n staging-preview --timeout=300s
        echo "Waiting for staging-preview-validator-4..."
        kubectl wait --for=condition=ready pod staging-preview-validator-4 -n staging-preview --timeout=300s
        echo "Waiting for staging-preview-validator-5..."
        kubectl wait --for=condition=ready pod staging-preview-validator-5 -n staging-preview --timeout=300s
      shell: bash

    - name: Validate
      run: |
        echo "Checking staging-preview-validator-1..."
        kubectl get pod staging-preview-validator-1 -n staging-preview -o jsonpath="{.status.containerStatuses[*].ready}"
        echo "Checking staging-preview-validator-2..."
        kubectl get pod staging-preview-validator-2 -n staging-preview -o jsonpath="{.status.containerStatuses[*].ready}"
        echo "Checking staging-preview-validator-3..."
        kubectl get pod staging-preview-validator-3 -n staging-preview -o jsonpath="{.status.containerStatuses[*].ready}"
        echo "Checking staging-preview-validator-4..."
        kubectl get pod staging-preview-validator-4 -n staging-preview -o jsonpath="{.status.containerStatuses[*].ready}"
        echo "Checking staging-preview-validator-5..."
        kubectl get pod staging-preview-validator-5 -n staging-preview -o jsonpath="{.status.containerStatuses[*].ready}"
        kubectl get pods -n staging-preview -o custom-columns='NAME:.metadata.name,READY:.status.containerStatuses[*].ready' | grep -E '^(staging-preview-validator-1|staging-preview-validator-2|staging-preview-validator-3|staging-preview-validator-4|staging-preview-validator-5)' | awk '{if ($2 != "true,true,true,true") exit 1}'
        echo "All pods are 5/5 up and ready"
      shell: bash
