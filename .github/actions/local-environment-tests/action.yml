name: "Deploy and Test Against Local Environment"
description: "Deploys a local environment and runs end-to-end tests."
inputs:
  sha:
    description: "SHA to checkout"
    required: true
  image:
    description: "Node Image"
    required: true
  toolkit-image:
    description: "Toolkit Image"
    required: true
  tag:
    description: "PC Artifact Tag"
    required: true
  tests:
    description: "Test set to run (premerge or postmerge)"
    required: true
  ghcr-password:
    description: "Password for Docker login to GHCR"
    required: true
  dockerhub-username:
    description: "Docker Hub username for authenticated public-image pulls (optional; empty = anonymous, rate-limited)"
    required: false
    default: ""
  dockerhub-password:
    description: "Docker Hub token for authenticated public-image pulls (optional; empty = anonymous, rate-limited)"
    required: false
    default: ""
  indexer-tag:
    description: "Indexer tag to use for the indexer image"
    required: true
  indexer-api-image:
    description: "Indexer API image reference"
    required: true
  chain-indexer-image:
    description: "Chain indexer image reference"
    required: true
  wallet-indexer-image:
    description: "Wallet indexer image reference"
    required: true

outputs: {}

runs:
  using: "composite"
  steps:
    - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
      with:
        version: v0.8.16
        use-cache: false

    # Match the tls_enabled: false setting the other self-hosted earthly jobs apply
    # (run / test-toolkit). Without this, this action's earthly invocation has a
    # different settings hash than the one already running on the host, and earthly's
    # reuse-or-recycle logic SIGTERMs the existing buildkitd — taking down any
    # concurrent earthly build on the same host. Still required after the WITH DOCKER
    # flip: it governs the *outer* earthly/buildkitd, which we deliberately keep shared.
    - name: Disable earthly TLS (self-hosted runner has no certs)
      shell: bash
      run: |
        echo "    tls_enabled: false" >> .earthly/config.yml

    # GHCR auth for earthly's `--pull` of the private node / indexer / toolkit images
    # into the nested DinD daemon (writes to the per-slot DOCKER_CONFIG the caller set).
    - name: Docker Login
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  #v4.2.0
      with:
        registry: ghcr.io
        username: MidnightCI
        password: ${{ inputs.ghcr-password }}

    # Docker Hub auth for the OUTER buildkit (docker.io FROM/base images). The
    # in-DinD compose pulls are covered separately by the --secret pair below.
    # Non-fatal: fork PRs have no Hub secrets and proceed anonymously.
    - name: Docker Hub Login
      if: inputs.dockerhub-password != ''
      continue-on-error: true
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  #v4.2.0
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}

    # The WHOLE premerge surface — stack bring-up → verify-finality → e2e suite →
    # toolkit multi-dest E2E — now runs INSIDE earthly's nested dockerd (+local-env-ci,
    # needs `-P`). The nested daemon is ephemeral and per-invocation, so there are no
    # leftover host containers to reclaim and no fixed host ports to collide on — which
    # is why the caller drops the repo-wide concurrency group. No host-side node/just/npm
    # setup is needed (it all lives inside the target). Source .envrc so EARTHLY_CONFIG
    # matches the other self-hosted jobs (else earthly recycles the shared buildkitd).
    - name: Deploy + test against local environment (nested dockerd)
      shell: bash
      env:
        NODE_IMAGE: ${{ inputs.image }}
        TOOLKIT_IMAGE: ${{ inputs.toolkit-image }}
        INDEXER_API_IMAGE: ${{ inputs.indexer-api-image }}
        CHAIN_INDEXER_IMAGE: ${{ inputs.chain-indexer-image }}
        WALLET_INDEXER_IMAGE: ${{ inputs.wallet-indexer-image }}
        DOCKERHUB_USER: ${{ inputs.dockerhub-username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub-password }}
      run: |
        . ./.envrc
        earthly -P \
          --secret DOCKERHUB_USER="$DOCKERHUB_USER" \
          --secret DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN" \
          +local-env-ci \
          --NODE_IMAGE="$NODE_IMAGE" \
          --TOOLKIT_IMAGE="$TOOLKIT_IMAGE" \
          --INDEXER_API_IMAGE="$INDEXER_API_IMAGE" \
          --CHAIN_INDEXER_IMAGE="$CHAIN_INDEXER_IMAGE" \
          --WALLET_INDEXER_IMAGE="$WALLET_INDEXER_IMAGE"
