name: "Deploy and Test Against Local Environment"
description: "Deploys a local environment and runs end-to-end tests."
inputs:
  sha:
    description: "SHA to checkout"
    required: true
  image:
    description: "Node Image"
    required: true
  toolkit-image:
    description: "Toolkit Image"
    required: true
  tag:
    description: "PC Artifact Tag"
    required: true
  tests:
    description: "Test set to run (premerge or postmerge)"
    required: true
  ghcr-password:
    description: "Password for Docker login to GHCR"
    required: true
  indexer-tag:
    description: "Indexer tag to use for the indexer image"
    required: true
  indexer-api-image:
    description: "Indexer API image reference"
    required: true
  chain-indexer-image:
    description: "Chain indexer image reference"
    required: true
  wallet-indexer-image:
    description: "Wallet indexer image reference"
    required: true

outputs: {}

runs:
  using: "composite"
  steps:
    - name: Install jq
      uses: dcarbone/install-jq-action@b7ef57d46ece78760b4019dbc4080a1ba2a40b45 # v3.2.0

    - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
      with:
        version: v0.8.16
        use-cache: false

    # Match the tls_enabled: false setting the other self-hosted earthly
    # jobs apply (run / test-toolkit). Without this, this action's earthly
    # invocation has a different settings hash than the one already running
    # on the host, and earthly's reuse-or-recycle logic SIGTERMs the existing
    # buildkitd — taking down any concurrent earthly build on the same host.
    - name: Disable earthly TLS (self-hosted runner has no certs)
      shell: bash
      run: |
        echo "    tls_enabled: false" >> .earthly/config.yml

    - name: Docker Login
      uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1  #v3.5.0
      with:
        registry: ghcr.io
        username: MidnightCI
        password: ${{ inputs.ghcr-password }}

    - name: Install just
      uses: taiki-e/install-action@c0dee14250395ae6b1754a99f67c1d693138b102  #v2.58.30
      with:
        tool: just

    - name: Set contracts path
      # midnight-reserve-contracts is a submodule of this repo, checked out by the caller's
      # actions/checkout (with submodules: true). Pinning lives in .gitmodules, not here.
      run: echo "MIDNIGHT_RESERVE_CONTRACTS_PATH=${GITHUB_WORKSPACE}/midnight-reserve-contracts" >> "$GITHUB_ENV"
      shell: bash

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  #v6.3.0
      with:
        # Keep in sync with NODE_VERSION in Earthfile audit-npm target
        node-version: '22'

    - name: Upgrade npm
      # Keep in sync with npm version in Earthfile audit-npm target
      run: npm install -g npm@11.11.0
      shell: bash

    # The local-env stack uses fixed container_names and publishes fixed host
    # ports (validators 30333-30337 / 9933-9944 / 9615-9619, plus 32000, 30000,
    # 8088, 4222). On a shared self-hosted host a container left by a cancelled
    # or crashed prior run keeps a name/port bound, so the fresh stack fails with
    # "port is already allocated" or a name conflict. The job's concurrency group
    # only serialises this job against itself, not against leftovers. Tear the
    # whole compose project down by label so every leftover service is reclaimed
    # regardless of which name/port it holds — rather than a hand-maintained port
    # list, which drifts as the compose file changes.
    - name: Reclaim leftover local-env stack (self-hosted shared host)
      shell: bash
      run: |
        docker compose -p local-env down --remove-orphans --volumes 2>/dev/null || true
        leftovers=$(docker ps -aq --filter "label=com.docker.compose.project=local-env" || true)
        if [ -n "$leftovers" ]; then
          echo "Force-removing leftover local-env containers: $leftovers"
          docker rm -f $leftovers || true
        fi

    - name: Deploy local environment
      run: |
        echo "🔍 Debug: Checking input values..."
        echo "NODE_IMAGE: ${NODE_IMAGE}"
        echo "INDEXER_API_IMAGE: ${INDEXER_API_IMAGE}"
        echo "CHAIN_INDEXER_IMAGE: ${CHAIN_INDEXER_IMAGE}"
        echo "WALLET_INDEXER_IMAGE: ${WALLET_INDEXER_IMAGE}"

        echo "🚀 Running Earthly command..."
        # Source .envrc so EARTHLY_CONFIG is set (self-hosted vs default switch).
        # Without this, earthly falls back to ~/.earthly/config.yml which has a
        # different settings hash than the other self-hosted jobs and recycles
        # the shared earthly-buildkitd container, cancelling concurrent builds.
        . ./.envrc
        earthly +start-local-env-with-indexer-ci \
          --NODE_IMAGE="${NODE_IMAGE}" \
          --INDEXER_API_IMAGE="${INDEXER_API_IMAGE}" \
          --CHAIN_INDEXER_IMAGE="${CHAIN_INDEXER_IMAGE}" \
          --WALLET_INDEXER_IMAGE="${WALLET_INDEXER_IMAGE}"
      shell: bash
      env:
        NODE_IMAGE: ${{ inputs.image }}
        INDEXER_API_IMAGE: ${{ inputs.indexer-api-image }}
        CHAIN_INDEXER_IMAGE: ${{ inputs.chain-indexer-image }}
        WALLET_INDEXER_IMAGE: ${{ inputs.wallet-indexer-image }}

    # Fails fast if any validator (including unified-storage nodes 4 and 5)
    # is stuck or panicking — GRANDPA needs 2/3 quorum, so a non-finalizing
    # validator stalls the network and per-node finality probing surfaces
    # the regression deterministically.
    - name: Verify all validators reach finality
      working-directory: local-environment
      run: npm run verify-finality:local-env -- --target-block 1 --timeout 300
      shell: bash

#    - name: Run Indexer E2E Tests
#      uses: ./.github/actions/reusable-e2e-tests
#      with:
#        just-command: indexer-api-e2e
#        ghcr-password: ${{ inputs.ghcr-password }}

    - name: e2e tests
      id: e2e-tests
      # Source .envrc so EARTHLY_CONFIG matches other self-hosted jobs (see
      # comment on the earlier earthly invocation in this action for why).
      run: . ./.envrc && earthly +local-env-e2e
      shell: bash

    - name: toolkit-multi-dest-e2e
      id: toolkit-multi-dest-e2e
      env:
        TOOLKIT_IMAGE: ${{ inputs.toolkit-image }}
      run: just toolkit-multi-dest-e2e "$TOOLKIT_IMAGE"
      shell: bash

    - name: Collect Docker logs
      if: ${{ failure() }}
      run: |
        mkdir -p local-environment-logs-initial
        docker ps -a --format '{{.Names}}' | while read -r line; do
          echo "======= Collecting logs for container $line ======="
          docker logs "$line" 2>&1 | tee "local-environment-logs-initial/$line.log" || true
        done
      shell: bash

    - name: Upload Docker logs artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: local-environment-logs-initial
        path: local-environment-logs-initial/
