name: +test

on:
  merge_group:
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "changes/**"
  push:
    branches: ["main"]
# no top level default permissions for security reasons
permissions: {}
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true
jobs:
  run:
    name: Run tests
    runs-on: ubuntu-latest-16-core-x64
    permissions:
      contents: read
      packages: write
      actions: write
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true

      - id: guard
        uses: ./.github/actions/tree-cache-guard

      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        if: steps.guard.outputs.hit != 'true'
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Free disk space
        if: steps.guard.outputs.hit != 'true'
        run: scripts/free-disk-space.sh

      - name: Log in to GHCR (for remote cache)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.guard.outputs.hit != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Authenticate to Docker Hub on internal PRs / pushes to avoid the unauthenticated
      # pull rate limit when WITH DOCKER pulls images like postgres for testcontainers.
      # Skipped on fork PRs where these secrets are not available.
      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Run build
        if: steps.guard.outputs.hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}
        run: |
          PUSH_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PUSH_FLAG="--push"
          fi
          . ./.envrc && earthly -P \
            --secret GITHUB_TOKEN="$GITHUB_TOKEN" \
            --secret DOCKERHUB_USER="$DOCKERHUB_USER" \
            --secret DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN" \
            --strict $PUSH_FLAG \
            --remote-cache=ghcr.io/midnightntwrk/midnight-node:cache-test +test

      - name: Upload test report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: (success() || failure()) && steps.guard.outputs.hit != 'true'
        with:
          name: Test Report
          path: test-artifacts/html

      - name: Upload lcov test report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: (success() || failure()) && steps.guard.outputs.hit != 'true'
        with:
          name: Lcov Coverage Report
          path: test-artifacts/tests.lcov

      - uses: ./.github/actions/tree-cache-guard/save
        if: steps.guard.outputs.hit != 'true'
        with:
          key: ${{ steps.guard.outputs.key }}
