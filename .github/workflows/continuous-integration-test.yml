name: +test

on:
  merge_group:
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "changes/**"
  push:
    branches: ["main"]
# no top level default permissions for security reasons
permissions: {}
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true
jobs:
  run:
    name: Run tests
    # Fork PRs run on ubuntu-latest, not the self-hosted pool: untrusted PR code is kept
    # off our own infrastructure. Same-repo PRs and push/merge_group keep self-hosted.
    # (This job is also skipped on fork PRs by its step guards; the routing is belt-and-braces.)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && fromJSON('["ubuntu-latest"]') || fromJSON('["self-hosted", "tier:large"]') }}
    permissions:
      contents: read
      packages: write
      actions: write
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout node repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: true

      - id: guard
        uses: ./.github/actions/tree-cache-guard

      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        if: steps.guard.outputs.hit != 'true'
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Free disk space
        if: steps.guard.outputs.hit != 'true' && runner.environment != 'self-hosted'
        run: scripts/free-disk-space.sh

      - name: Log in to GHCR (for remote cache)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.guard.outputs.hit != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Authenticate to Docker Hub on internal PRs / pushes to avoid the unauthenticated
      # pull rate limit when WITH DOCKER pulls images like postgres for testcontainers.
      # Skipped on fork PRs where these secrets are not available.
      # If for some reason we can't log in we should proceed unauthed.
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        continue-on-error: true
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Run build
        if: steps.guard.outputs.hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}
          # actions/checkout leaves the workspace on the PR merge commit in
          # detached-HEAD state, so the EARTHLY_GIT_BRANCH builtin resolves to
          # the literal string "HEAD" for every PR — useless for cache scoping.
          # Use the actual head ref (PR source branch) or ref_name (push /
          # merge_group). Sanitize: substitute any char outside [A-Za-z0-9._-]
          # with '-' so e.g. `feat/foo` becomes `feat-foo`.
          GITHUB_REF_RAW: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          GH_REF_FOR_BUILD: ${{ github.ref }}
        run: |
          PUSH_FLAG=""
          if [ "$GH_REF_FOR_BUILD" = "refs/heads/main" ]; then
            PUSH_FLAG="--push"
          fi
          CACHE_KEY=$(printf '%s' "$GITHUB_REF_RAW" | tr -c 'A-Za-z0-9._-' '-')
          # tr produces an empty string for empty input; guard so we never
          # cache as `target-` (would silently merge all unkeyed runs).
          if [ -z "$CACHE_KEY" ]; then
            echo "::error::could not derive CACHE_KEY from refs (head_ref=$GITHUB_REF_RAW)"
            exit 1
          fi
          echo "Using CACHE_KEY=$CACHE_KEY"
          . ./.envrc && earthly -P \
            --secret GITHUB_TOKEN="$GITHUB_TOKEN" \
            --secret DOCKERHUB_USER="$DOCKERHUB_USER" \
            --secret DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN" \
            --strict $PUSH_FLAG \
            --remote-cache=ghcr.io/midnightntwrk/midnight-node:cache-test \
            +test --CACHE_KEY="$CACHE_KEY"

      - name: Upload test report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: (success() || failure()) && steps.guard.outputs.hit != 'true'
        with:
          name: Test Report
          path: test-artifacts/html

      - name: Upload lcov test report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: (success() || failure()) && steps.guard.outputs.hit != 'true'
        with:
          name: Lcov Coverage Report
          path: test-artifacts/tests.lcov

      - uses: ./.github/actions/tree-cache-guard/save
        if: steps.guard.outputs.hit != 'true'
        with:
          key: ${{ steps.guard.outputs.key }}
