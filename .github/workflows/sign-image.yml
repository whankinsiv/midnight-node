name: Sign Container Image

on:
  workflow_call:
    inputs:
      image:
        description: 'Full image reference (registry/name:tag)'
        required: true
        type: string

# no top level default permissions for security reasons
permissions: {}

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless signing
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Sign image
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          # Get the image digest from registry
          DIGEST=$(docker manifest inspect "${IMAGE}" --verbose | jq -r '.Descriptor.digest')

          echo "Signing ${IMAGE} (${DIGEST})"
          cosign sign --yes "${IMAGE}@${DIGEST}"
