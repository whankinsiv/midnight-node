name: fork-network

# Fork a well-known midnight network from a snapshot, then upgrade it from
# $node_image to $new_node_image using the local-environment tooling.
# Validator keys + on-chain authority storage (including Council and
# Technical Committee membership) are replaced by mock-authorities'
# deterministic set, and each node's built-in mock main chain follower serves
# all Cardano-derived data. No Cardano db-sync, no secrets, no external infra.
#
# upgrade_mode selects the rollout shape:
#   image   - roll each validator container to $new_node_image (no runtime
#             upgrade; the chain keeps the snapshot's runtime)
#   runtime - keep validators on $node_image and submit the new runtime
#             wasm (extracted from $new_node_image) through the
#             federated-authority governance flow
#   full    - production-shaped rehearsal: image rollout first, then the
#             runtime upgrade via governance

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Well-known network to fork"
        required: true
        type: choice
        default: devnet
        options:
          - devnet
          - qanet
      mock_authorities_tag:
        description: "mock-authorities image tag (>= 368fd98 required for the runtime and full upgrade modes: older tags do not rewrite Council/Technical Committee membership)"
        required: true
        default: "368fd98"
      node_image:
        description: "midnight-node image to fork from (must match the snapshot's runtime host fns)"
        required: true
      new_node_image:
        description: "midnight-node image to upgrade to (image rollout target and/or runtime wasm source, per upgrade_mode)"
        required: true
      upgrade_mode:
        description: "Upgrade shape: roll the node image, submit a runtime upgrade via governance, or both in sequence"
        required: true
        type: choice
        default: image
        options:
          - image
          - runtime
          - full
      allow_same_version:
        description: "Accept a runtime wasm that does not bump spec_version (uses authorizeUpgradeWithoutChecks; rehearsal-only escape hatch)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

concurrency:
  group: fork-network-${{ inputs.network }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NETWORK: ${{ inputs.network }}
  NODE_IMAGE: ${{ inputs.node_image }}
  NEW_NODE_IMAGE: ${{ inputs.new_node_image }}
  UPGRADE_MODE: ${{ inputs.upgrade_mode }}
  ALLOW_SAME_VERSION: ${{ inputs.allow_same_version }}
  MOCK_AUTHORITIES_IMAGE: ghcr.io/shieldedtech/mock-authorities:${{ inputs.mock_authorities_tag }}
  SNAPSHOT_INDEX_URL: https://dg39snjayoq3t.cloudfront.net/index.json
  SNAPSHOT_BASE_URL: https://dg39snjayoq3t.cloudfront.net

jobs:
  fork:
    # 600 GB SSD — sized for qanet (latest snapshot is ~58 GiB unpacked per
    # validator copy; the smaller org runners can't hold all 12 copies).
    # Devnet would fit on a smaller runner but the cost delta is small
    # and using one runner keeps the workflow simple.
    runs-on: [self-hosted, "tier:large"]
    timeout-minutes: 45

    steps:
      # `act` shares the host docker socket, so this step's
      # `docker image prune --all --force` would nuke the developer's local
      # image cache (including the locally-cached mock-authorities image we
      # rely on as the pull fallback). Skip it on act runs.
      # Also skip on self-hosted — the action's targets (e.g. /usr/share/swift,
      # android SDK) aren't on our self-hosted runner.
      - name: Free disk space
        if: env.ACT != 'true' && runner.environment != 'self-hosted'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Disk space after cleanup
        run: df -h /

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # `act` injects ACT=true; on local runs we skip the login and rely on
      # the pull-or-inspect fallback below to hit cached images.
      - name: Login to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Install local-environment deps
        working-directory: local-environment
        run: npm install

      # The local-environment tool takes a fully-qualified snapshot URI, so we
      # resolve the latest snapshot for $NETWORK from the backup system's
      # manifest here.
      - name: Resolve latest snapshot URL
        id: cfg
        run: |
          tmp=$(mktemp)
          curl -fsSL "$SNAPSHOT_INDEX_URL" -o "$tmp"
          archive=$(jq -r --arg net "$NETWORK" '
            .[$net]
            | to_entries
            | map(.value[])
            | sort_by(.timestamp)
            | reverse
            | .[0]
            | .s3_path
            | sub("^s3://[^/]+/"; "")
          ' "$tmp")
          if [ -z "$archive" ] || [ "$archive" = "null" ]; then
            echo "No snapshots found in index for network: $NETWORK" >&2
            exit 1
          fi
          snapshot_url="$SNAPSHOT_BASE_URL/$archive"
          echo "Selected snapshot: $snapshot_url"
          echo "snapshot_url=$snapshot_url" >> "$GITHUB_OUTPUT"
          echo "network_dir=local-environment/src/networks/well-known/$NETWORK" >> "$GITHUB_OUTPUT"

      - name: Pull images
        run: |
          # Fall back to a local copy if pull fails — lets us test locally-built
          # images (e.g. act) without a remote push.
          docker pull "$MOCK_AUTHORITIES_IMAGE" || docker image inspect "$MOCK_AUTHORITIES_IMAGE" >/dev/null
          docker pull "$NODE_IMAGE" || docker image inspect "$NODE_IMAGE" >/dev/null
          docker pull "$NEW_NODE_IMAGE" || docker image inspect "$NEW_NODE_IMAGE" >/dev/null

      # The node image ships the runtime wasm it was built with under
      # /artifacts-<arch>/ (see node-image in Earthfile). Copy it into
      # local-environment/artifacts/, the only root the upgrade CLI's wasm
      # path sandbox accepts, and prefer the compact.compressed blob — it is
      # what production upgrades submit and keeps the extrinsic small.
      - name: Extract runtime wasm from new node image
        if: inputs.upgrade_mode != 'image'
        id: wasm
        run: |
          cid=$(docker create "$NEW_NODE_IMAGE")
          trap 'docker rm -f "$cid" >/dev/null' EXIT
          mkdir -p local-environment/artifacts/upgrade
          extracted=""
          for arch in amd64 arm64; do
            if docker cp "$cid:/artifacts-$arch/." local-environment/artifacts/upgrade/ 2>/dev/null; then
              extracted="yes"
              break
            fi
          done
          if [ -z "$extracted" ]; then
            echo "No /artifacts-<arch> directory found in $NEW_NODE_IMAGE" >&2
            exit 1
          fi
          wasm=""
          for pattern in '*.compact.compressed.wasm' '*.compact.wasm' '*.wasm'; do
            wasm=$(find local-environment/artifacts/upgrade -maxdepth 1 -name "$pattern" | sort | head -1)
            [ -n "$wasm" ] && break
          done
          if [ -z "$wasm" ]; then
            echo "No runtime wasm found in $NEW_NODE_IMAGE" >&2
            exit 1
          fi
          echo "Using runtime wasm: $wasm"
          echo "wasm_rel=upgrade/$(basename "$wasm")" >> "$GITHUB_OUTPUT"

      # local-environment image-upgrade does:
      #   1. Restore snapshot into per-validator data dirs (HTTP)
      #   2. Run mock-authorities convert against the restored data
      #   3. Generate the mock-mode compose override
      #   4. `docker compose -f base -f override up -d` at $NODE_IMAGE
      #   5. Roll each validator service from $NODE_IMAGE → $NEW_NODE_IMAGE
      #      with `up -d --no-deps --force-recreate`, gated on health
      - name: Run image-upgrade
        if: inputs.upgrade_mode == 'image'
        working-directory: local-environment
        env:
          SNAPSHOT_URL: ${{ steps.cfg.outputs.snapshot_url }}
        run: |
          npm run "image-upgrade:${NETWORK}" -- --from-snapshot "$SNAPSHOT_URL"

      # Governance signer URIs are fixed: mock-authorities convert rewrites
      # Council membership to //Dave //Eve //Ferdie and Technical Committee
      # membership to //Alice //Bob //Charlie (matching the mock federated
      # authority observation source), so these dev-keyring URIs always meet
      # the 2/3 approval threshold on a freshly converted fork.
      #
      # node1's container RPC port 9944 is published on host port 9950, but on
      # some self-hosted runners the host loopback -> docker-published-port path
      # is black-holed (e.g. Docker started with userland-proxy disabled): the
      # SYN is silently dropped, so the RPC client hangs. So bring the fork up
      # first, then connect to whichever endpoint actually answers -- preferring
      # the published port, but falling back to node1's docker bridge IP, which
      # is routable from the runner regardless of the loopback/DNAT setup.
      - name: Run runtime upgrade via governance
        if: inputs.upgrade_mode == 'runtime'
        working-directory: local-environment
        env:
          SNAPSHOT_URL: ${{ steps.cfg.outputs.snapshot_url }}
          WASM_REL: ${{ steps.wasm.outputs.wasm_rel }}
        run: |
          same_version_flag=()
          if [ "$ALLOW_SAME_VERSION" = "true" ]; then
            same_version_flag=(--allow-same-version)
          fi

          # Bring the fork up first so we can probe for a reachable RPC endpoint.
          npm run "run:${NETWORK}" -- --from-snapshot "$SNAPSHOT_URL"

          node1_ip="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' node1 | tr -d '[:space:]')"
          echo "node1 bridge IP: ${node1_ip:-<none>}"
          candidates="127.0.0.1:9950 [::1]:9950"
          [ -n "$node1_ip" ] && candidates="$candidates ${node1_ip}:9944"

          probe() {
            curl -sS --max-time 5 -o /dev/null \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}' \
              "http://$1"
          }

          # `compose up -d` returns before the node binds its RPC port, so a
          # single-shot probe races the node boot and loses. Poll all candidates
          # until one answers system_health or the deadline hits.
          rpc_ws=""
          deadline=$((SECONDS + 120))
          while [ "$SECONDS" -lt "$deadline" ]; do
            for target in $candidates; do
              if probe "$target" 2>/dev/null; then
                echo "RPC reachable at http://${target}"
                rpc_ws="ws://${target}"
                echo "RPC_HTTP=http://${target}" >> "$GITHUB_ENV"
                break 2
              fi
            done
            echo "RPC not ready yet (${SECONDS}s elapsed); retrying..."
            sleep 3
          done
          if [ -z "$rpc_ws" ]; then
            echo "No reachable RPC endpoint found after ${SECONDS}s; per-target errors:" >&2
            for target in $candidates; do
              echo "--- http://${target}" >&2
              probe "$target" || true
            done
            exit 1
          fi

          npm run "governance-runtime-upgrade:${NETWORK}" -- \
            --skip-run \
            --wasm "$WASM_REL" \
            --rpc-url "$rpc_ws" \
            --council-uris //Dave //Eve //Ferdie \
            --technical-uris //Alice //Bob //Charlie \
            --executor-uri //Alice \
            "${same_version_flag[@]}"

      # NOTE: full-upgrade brings the fork up itself (image rollout) and has no
      # --skip-run, so we cannot pre-resolve node1's bridge IP the way the
      # runtime step does. It therefore still relies on the host published port;
      # on a runner where the loopback path is black-holed this will time out.
      # Making full-upgrade robust needs a tooling-side change (resolve the
      # node's reachable endpoint after its internal bring-up).
      - name: Run full-upgrade
        if: inputs.upgrade_mode == 'full'
        working-directory: local-environment
        env:
          SNAPSHOT_URL: ${{ steps.cfg.outputs.snapshot_url }}
          WASM_REL: ${{ steps.wasm.outputs.wasm_rel }}
        run: |
          same_version_flag=()
          if [ "$ALLOW_SAME_VERSION" = "true" ]; then
            same_version_flag=(--allow-same-version)
          fi
          npm run "full-upgrade:${NETWORK}" -- \
            --from-snapshot "$SNAPSHOT_URL" \
            --wasm "$WASM_REL" \
            --rpc-url ws://127.0.0.1:9950 \
            --council-uris //Dave //Eve //Ferdie \
            --technical-uris //Alice //Bob //Charlie \
            --executor-uri //Alice \
            "${same_version_flag[@]}"

      - name: Wait for block + finality progression
        timeout-minutes: 15
        env:
          REQUIRED_BLOCKS: "5"
        run: |
          # Reuse the endpoint the upgrade step found reachable (published port
          # or node1's bridge IP); fall back to the published port otherwise.
          RPC_URL="${RPC_HTTP:-http://127.0.0.1:9950}"
          echo "Using RPC endpoint: $RPC_URL"
          get_tip() {
            curl -sf -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"chain_getHeader","params":[]}' \
              "$RPC_URL" \
              | jq -r '.result.number // empty'
          }
          get_final() {
            curl -sf -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"chain_getFinalizedHead","params":[]}' \
              "$RPC_URL" \
              | jq -r '.result // empty'
          }

          echo "Waiting for RPC to come up..."
          for _ in $(seq 1 60); do
            if tip_hex=$(get_tip) && [ -n "$tip_hex" ]; then
              echo "RPC up. Starting tip: $tip_hex"
              break
            fi
            sleep 5
          done
          [ -n "$tip_hex" ] || { echo "RPC never came up"; exit 1; }

          start_tip=$((16#${tip_hex#0x}))
          start_final=$(get_final)
          echo "Starting block: $start_tip, finalized head: $start_final"

          deadline=$((SECONDS + 720))
          while [ $SECONDS -lt $deadline ]; do
            cur_hex=$(get_tip || true)
            cur_final=$(get_final || true)
            if [ -n "$cur_hex" ]; then
              cur_tip=$((16#${cur_hex#0x}))
              advanced=$((cur_tip - start_tip))
              final_changed="no"
              [ -n "$cur_final" ] && [ "$cur_final" != "$start_final" ] && final_changed="yes"
              echo "tip=$cur_tip (+$advanced) finalized=$cur_final changed=$final_changed"
              if [ $advanced -ge $REQUIRED_BLOCKS ] && [ "$final_changed" = "yes" ]; then
                echo "Chain is producing and finalizing blocks."
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Chain failed to advance $REQUIRED_BLOCKS blocks with finality change in time"
          exit 1

      # Belt-and-braces on top of the upgrade tool's own CodeUpdated event
      # check: assert the on-chain :code is byte-identical to the candidate
      # wasm we extracted from $NEW_NODE_IMAGE. applyAuthorizedUpgrade stores
      # the submitted blob verbatim, so a plain hex comparison suffices.
      - name: Verify on-chain runtime matches candidate wasm
        if: inputs.upgrade_mode != 'image'
        env:
          WASM_REL: ${{ steps.wasm.outputs.wasm_rel }}
        run: |
          RPC_URL="${RPC_HTTP:-http://127.0.0.1:9950}"
          echo "Using RPC endpoint: $RPC_URL"
          wasm_file="local-environment/artifacts/$WASM_REL"
          expected_hex=$(od -An -v -tx1 "$wasm_file" | tr -d ' \n')
          onchain_hex=$(curl -sf -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"state_getStorage","params":["0x3a636f6465"]}' \
            "$RPC_URL" | jq -r '.result // empty' | sed 's/^0x//' || true)
          if [ -z "$onchain_hex" ]; then
            echo "Could not read :code from $RPC_URL" >&2
            exit 1
          fi
          if [ "$expected_hex" != "$onchain_hex" ]; then
            echo "On-chain :code does not match the candidate runtime wasm ($wasm_file)" >&2
            echo "candidate bytes: $(( ${#expected_hex} / 2 )), on-chain bytes: $(( ${#onchain_hex} / 2 ))" >&2
            exit 1
          fi
          echo "On-chain :code matches $wasm_file ($(( ${#expected_hex} / 2 )) bytes)."
          curl -sf -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"state_getRuntimeVersion","params":[]}' \
            "$RPC_URL" | jq '{specName: .result.specName, specVersion: .result.specVersion}'

      - name: Dump compose logs
        if: always()
        env:
          NETWORK_DIR: ${{ steps.cfg.outputs.network_dir }}
        run: |
          cd "$NETWORK_DIR"
          mkdir -p /tmp/forked-network-logs
          override_arg=()
          if [ -f "${NETWORK}.mock.override.yaml" ]; then
            override_arg=(-f "${NETWORK}.mock.override.yaml")
          fi
          docker compose -f "${NETWORK}.network.yaml" "${override_arg[@]}" logs --no-color \
            > /tmp/forked-network-logs/compose.log || true
          docker compose -f "${NETWORK}.network.yaml" "${override_arg[@]}" ps \
            > /tmp/forked-network-logs/ps.txt || true
          df -h / > /tmp/forked-network-logs/disk.txt || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forked-${{ inputs.network }}-logs
          path: /tmp/forked-network-logs/
          if-no-files-found: warn

      - name: Tear down
        if: always()
        env:
          NETWORK_DIR: ${{ steps.cfg.outputs.network_dir }}
        run: |
          cd "$NETWORK_DIR"
          override_arg=()
          if [ -f "${NETWORK}.mock.override.yaml" ]; then
            override_arg=(-f "${NETWORK}.mock.override.yaml")
          fi
          docker compose -f "${NETWORK}.network.yaml" "${override_arg[@]}" down -v || true
