name: fork-network

# Stand up a locally-forked midnight network from a snapshot, with validator
# keys and on-chain authority storage replaced by mock-authorities'
# deterministic set, and the node's built-in mock main chain follower serving
# all Cardano-derived data. No Cardano db-sync, no secrets, no external infra.

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Well-known network to fork"
        required: true
        type: choice
        default: devnet
        options:
          - devnet
          - qanet
          - govnet
      mock_authorities_tag:
        description: "mock-authorities image tag"
        required: true
        default: "0f347c5"
      node_image:
        description: "midnight-node image (must be compatible with the snapshot's runtime)"
        required: true

permissions:
  contents: read
  packages: read

concurrency:
  group: fork-network-${{ inputs.network }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NETWORK: ${{ inputs.network }}
  NODE_IMAGE: ${{ inputs.node_image }}
  MOCK_AUTHORITIES_IMAGE: ghcr.io/shieldedtech/mock-authorities:${{ inputs.mock_authorities_tag }}
  SNAPSHOT_INDEX_URL: https://dg39snjayoq3t.cloudfront.net/index.json
  SNAPSHOT_BASE_URL: https://dg39snjayoq3t.cloudfront.net

jobs:
  fork:
    # 600 GB SSD — sized for qanet (latest snapshot is ~58 GiB unpacked per
    # validator copy; the smaller org runners can't hold all 12 copies).
    # Devnet/govnet would fit on smaller runners but the cost delta is small
    # and using one runner keeps the workflow simple.
    runs-on: [self-hosted, "tier:large"]
    timeout-minutes: 45

    steps:
      # `act` shares the host docker socket, so this step's
      # `docker image prune --all --force` would nuke the developer's local
      # image cache (including the locally-cached mock-authorities image we
      # rely on as the pull fallback). Skip it on act runs.
      # Also skip on self-hosted — the action's targets (e.g. /usr/share/swift,
      # android SDK) aren't on our self-hosted runner.
      - name: Free disk space
        if: env.ACT != 'true' && runner.environment != 'self-hosted'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Disk space after cleanup
        run: df -h /

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `act` injects ACT=true; on local runs we skip the login and rely on
      # the pull-or-inspect fallback below to hit cached images.
      - name: Login to GHCR
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      # Resolve per-network knobs once and expose them to subsequent steps.
      # The latest snapshot URL is picked from the backup system's manifest.
      - name: Compute network config
        id: cfg
        run: |
          # Per-network static config:
          # - chain_id            : on-disk paritydb chain folder name
          # - dir                 : repo dir holding the network's compose + res
          # - compose             : base compose file (relative to dir)
          # - num_vals            : how many validators to materialize
          #                         (mock-authorities --num-validators)
          # - validator_services  : compose services that map ./data/node-N:/data
          # - extra_services      : non-validator services that still need
          #                         fork-mode env (e.g. qanet's boot-node)
          case "$NETWORK" in
            devnet)
              chain_id="midnight_devnet"
              dir="local-environment/src/networks/well-known/devnet"
              compose="devnet.network.yaml"
              num_vals=6
              validator_services="node1 node2 node3 node4 node5 node6"
              extra_services=""
              ;;
            qanet)
              chain_id="midnight_qanet"
              dir="local-environment/src/networks/well-known/qanet"
              compose="qanet.network.yaml"
              num_vals=12
              validator_services="node1 node2 node3 node4 node5 node6 node7 node8 node9 node10 node11 node12"
              extra_services="boot-node"
              ;;
            govnet)
              chain_id="midnight_govnet"
              dir="local-environment/src/networks/well-known/govnet"
              compose="govnet.network.yaml"
              num_vals=5
              validator_services="node1 node2 node3 node4 node5"
              extra_services=""
              ;;
            *)
              echo "Unsupported network: $NETWORK" >&2
              exit 1
              ;;
          esac

          # Pick the highest-timestamp snapshot for this network across all
          # source hosts. The S3 path is rewritten to the CloudFront URL we
          # actually have public access to.
          tmp=$(mktemp)
          curl -fsSL "$SNAPSHOT_INDEX_URL" -o "$tmp"
          archive=$(jq -r --arg net "$NETWORK" '
            .[$net]
            | to_entries
            | map(.value[])
            | sort_by(.timestamp)
            | reverse
            | .[0]
            | .s3_path
            | sub("^s3://[^/]+/"; "")
          ' "$tmp")
          if [ -z "$archive" ] || [ "$archive" = "null" ]; then
            echo "No snapshots found in index for network: $NETWORK" >&2
            exit 1
          fi
          snapshot_url="$SNAPSHOT_BASE_URL/$archive"
          echo "Selected snapshot: $snapshot_url"

          {
            echo "chain_id=$chain_id"
            echo "dir=$dir"
            echo "compose=$compose"
            echo "num_vals=$num_vals"
            echo "validator_services=$validator_services"
            echo "extra_services=$extra_services"
            echo "snapshot_url=$snapshot_url"
            echo "mock_file=${NETWORK}-mock.json"
          } >> "$GITHUB_OUTPUT"

      - name: Pull images
        run: |
          # Fall back to a local copy if pull fails — lets us test locally-built
          # images (e.g. act) without a remote push.
          docker pull "$MOCK_AUTHORITIES_IMAGE" || docker image inspect "$MOCK_AUTHORITIES_IMAGE" >/dev/null
          docker pull "$NODE_IMAGE" || docker image inspect "$NODE_IMAGE" >/dev/null

      - name: Download snapshot
        env:
          SNAPSHOT_URL: ${{ steps.cfg.outputs.snapshot_url }}
        run: |
          curl -fL --retry 3 --retry-delay 5 -o /tmp/snapshot.tar "$SNAPSHOT_URL"
          ls -lh /tmp/snapshot.tar

      # Restore the snapshot into one data dir per service that mounts ./data/X
      # in the compose file. Disk usage scales linearly with validator count;
      # the 600 GB runner above is sized for qanet's 12 validators × ~58 GiB.
      - name: Restore snapshot into each node folder
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          VALIDATORS: ${{ steps.cfg.outputs.validator_services }}
          EXTRAS: ${{ steps.cfg.outputs.extra_services }}
        run: |
          cd "$DIR"
          for svc in $VALIDATORS $EXTRAS; do
            # Compose volumes use ./data/<svc-or-suffix>:/data — match that.
            case "$svc" in
              boot-node) data_dir="data/boot-node" ;;
              node*)     data_dir="data/node-${svc#node}" ;;
              *)         data_dir="data/$svc" ;;
            esac
            mkdir -p "$data_dir"
            # Snapshot tar has a single top-level `node/` dir; strip it so
            # paths become $data_dir/chains/<chain-id>/...
            tar -xf /tmp/snapshot.tar -C "$data_dir" --strip-components=1
          done
          # mock-authorities and the node both run as a non-root appuser
          # in-container and open parity-db O_RDWR; make the extracted tree
          # writable regardless of what uid the container runs as.
          chmod -R a+rwX data
          df -h .

      - name: Run mock-authorities convert
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          CHAIN_ID: ${{ steps.cfg.outputs.chain_id }}
          NUM_VALS: ${{ steps.cfg.outputs.num_vals }}
        run: |
          cd "$DIR"
          # Same uid-mismatch issue as the data mount: the mock-authorities
          # container runs as a non-root appuser and writes
          # mock-registrations.json + seeds/ here.
          mkdir -p mocked-config
          chmod a+rwX mocked-config
          docker run --rm \
            -v "$PWD/data:/data" \
            -v "$PWD/mocked-config:/out" \
            "$MOCK_AUTHORITIES_IMAGE" \
            convert \
              --data-dir /data \
              --chain-id "$CHAIN_ID" \
              --num-validators "$NUM_VALS" \
              --output-dir /out
          test -f mocked-config/mock-registrations.json
          ls mocked-config/seeds

      - name: Place mock registrations where the node expects them
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          MOCK_FILE: ${{ steps.cfg.outputs.mock_file }}
        run: |
          cd "$DIR"
          mkdir -p res/mock-bridge-data
          cp mocked-config/mock-registrations.json "res/mock-bridge-data/$MOCK_FILE"

      - name: Generate mock-mode compose override
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          MOCK_FILE: ${{ steps.cfg.outputs.mock_file }}
          VALIDATORS: ${{ steps.cfg.outputs.validator_services }}
          EXTRAS: ${{ steps.cfg.outputs.extra_services }}
        run: |
          cd "$DIR"
          override="${NETWORK}.mock.override.yaml"
          # Heredocs break the outer YAML block-scalar indent (body lines dedent
          # below the step's run: | indent and terminate the scalar early), so
          # we emit each line with echo.
          {
            echo "services:"
            i=0
            for svc in $VALIDATORS; do
              echo "  $svc:"
              echo "    environment:"
              echo "      USE_MAIN_CHAIN_FOLLOWER_MOCK: \"true\""
              echo "      MOCK_REGISTRATIONS_FILE: \"/res/mock-bridge-data/$MOCK_FILE\""
              echo "      AURA_SEED_FILE: /seeds/aura.seed"
              echo "      GRANDPA_SEED_FILE: /seeds/grandpa.seed"
              echo "      CROSS_CHAIN_SEED_FILE: /seeds/cross_chain.seed"
              echo "      SEED_PHRASE: \"\""
              echo "      DB_SYNC_POSTGRES_CONNECTION_STRING: \"\""
              echo "    volumes:"
              echo "      - ./mocked-config/seeds/validator-${i}:/seeds"
              # The base compose's x-node-common anchor mount ./res:/res is
              # overridden by each service's own volumes list. Overlay just
              # the mock json into the image's baked-in /res so we keep
              # chain-spec and the other res files intact.
              echo "      - ./res/mock-bridge-data/$MOCK_FILE:/res/mock-bridge-data/$MOCK_FILE:ro"
              i=$((i+1))
            done
            for svc in $EXTRAS; do
              # Non-validators (e.g. qanet's boot-node) don't sign anything but
              # still need the mock follower flipped on so they don't try to
              # reach a Cardano db-sync that isn't running.
              echo "  $svc:"
              echo "    environment:"
              echo "      USE_MAIN_CHAIN_FOLLOWER_MOCK: \"true\""
              echo "      MOCK_REGISTRATIONS_FILE: \"/res/mock-bridge-data/$MOCK_FILE\""
              echo "      DB_SYNC_POSTGRES_CONNECTION_STRING: \"\""
              echo "    volumes:"
              echo "      - ./res/mock-bridge-data/$MOCK_FILE:/res/mock-bridge-data/$MOCK_FILE:ro"
            done
          } > "$override"
          cat "$override"

      - name: Start the forked network
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          COMPOSE: ${{ steps.cfg.outputs.compose }}
        run: |
          cd "$DIR"
          docker compose \
            -f "$COMPOSE" \
            -f "${NETWORK}.mock.override.yaml" \
            up -d
          docker compose -f "$COMPOSE" ps

      - name: Wait for block + finality progression
        timeout-minutes: 15
        env:
          RPC_URL: "http://localhost:9950"
          REQUIRED_BLOCKS: "5"
        run: |
          get_tip() {
            curl -sf -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"chain_getHeader","params":[]}' \
              "$RPC_URL" \
              | jq -r '.result.number // empty'
          }
          get_final() {
            curl -sf -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"chain_getFinalizedHead","params":[]}' \
              "$RPC_URL" \
              | jq -r '.result // empty'
          }

          echo "Waiting for RPC to come up..."
          for _ in $(seq 1 60); do
            if tip_hex=$(get_tip) && [ -n "$tip_hex" ]; then
              echo "RPC up. Starting tip: $tip_hex"
              break
            fi
            sleep 5
          done
          [ -n "$tip_hex" ] || { echo "RPC never came up"; exit 1; }

          start_tip=$((16#${tip_hex#0x}))
          start_final=$(get_final)
          echo "Starting block: $start_tip, finalized head: $start_final"

          deadline=$((SECONDS + 720))
          while [ $SECONDS -lt $deadline ]; do
            cur_hex=$(get_tip || true)
            cur_final=$(get_final || true)
            if [ -n "$cur_hex" ]; then
              cur_tip=$((16#${cur_hex#0x}))
              advanced=$((cur_tip - start_tip))
              final_changed="no"
              [ -n "$cur_final" ] && [ "$cur_final" != "$start_final" ] && final_changed="yes"
              echo "tip=$cur_tip (+$advanced) finalized=$cur_final changed=$final_changed"
              if [ $advanced -ge $REQUIRED_BLOCKS ] && [ "$final_changed" = "yes" ]; then
                echo "Chain is producing and finalizing blocks."
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Chain failed to advance $REQUIRED_BLOCKS blocks with finality change in time"
          exit 1

      - name: Dump compose logs
        if: always()
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          COMPOSE: ${{ steps.cfg.outputs.compose }}
        run: |
          cd "$DIR"
          mkdir -p /tmp/forked-network-logs
          docker compose -f "$COMPOSE" logs --no-color \
            > /tmp/forked-network-logs/compose.log || true
          docker compose -f "$COMPOSE" ps \
            > /tmp/forked-network-logs/ps.txt || true
          df -h / > /tmp/forked-network-logs/disk.txt || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forked-${{ inputs.network }}-logs
          path: /tmp/forked-network-logs/
          if-no-files-found: warn

      - name: Tear down
        if: always()
        env:
          DIR: ${{ steps.cfg.outputs.dir }}
          COMPOSE: ${{ steps.cfg.outputs.compose }}
        run: |
          cd "$DIR"
          docker compose -f "$COMPOSE" down -v || true
