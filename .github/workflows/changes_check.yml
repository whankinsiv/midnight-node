# Enforces the update of a change file on every pull request
name: "Changes Check"
on:
  # merge_group: - skip changes check for merge queue as we don't want merges kicked out for
  # link 500s errors. Checking at PR level is sufficient.
  pull_request:
    # The specific activity types are listed here to include "labeled" and "unlabeled"
    # (which are not included by default for the "pull_request" trigger).
    # This is needed to allow skipping enforcement of the changelog in PRs with specific labels,
    # as defined in the (optional) "skipLabels" property.
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled, edited]
    paths-ignore:
      - '.github/**'
      - 'changes/**'
      - 'docs/**'
      - 'tests/**'
      - '**/tests/**'
      - '**/test/**'
      - '**/*.test.ts'
      - '**/tests.rs'

jobs:
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      packages: read
      contents: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork == false
        with:
          registry: ghcr.io/midnight-ntwrk
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: true

      - name: Install Season
        uses: ./.github/actions/install-season
        with:
          gh-token: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR title is untrusted input - only ever handle it via env, never inline
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            # Fetch labels fresh using gh CLI - always safe
            LABELS=$(gh pr view "${{ github.event.pull_request.number }}" --json labels | jq -c '[.labels[].name]')
            echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" == "merge_group" ]; then
            PR_NUM=$(echo "${{ github.event.merge_group.head_ref }}" | sed -n 's/.*\/pr-\([0-9]*\)-.*/\1/p')
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
            LABELS=$(gh pr view "$PR_NUM" --json labels | jq -c '[.labels[].name]')
            echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
            PR_TITLE=$(gh pr view "$PR_NUM" --json title -q .title)
          fi
          # CI-only PRs ("ci:" / "ci(scope):" conventional-commit titles) don't need a change file
          if printf '%s' "$PR_TITLE" | grep -qE '^ci(\([^)]*\))?:'; then
            echo "ci_title=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_title=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check changes can be rendered
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork == false
        run: season build

      - name: Check changes files for link to PR
        if: ${{ steps.pr.outputs.ci_title != 'true' && !contains(fromJSON(steps.pr.outputs.labels), 'skip-changes-check-all') && !contains(fromJSON(steps.pr.outputs.labels), 'renovate') && !contains(fromJSON(steps.pr.outputs.labels), 'dependencies') }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          FILENAME=$(grep -R 'changes' -e "pull/$PR_NUMBER" | head -1 | cut -d':' -f1)
          if [ -z "$FILENAME" ]; then
            echo "No changes found for PR $PR_NUMBER"
            exit 1
          else
            echo "Changes file for PR $PR_NUMBER found: $FILENAME"
          fi

      - name: Check changes files for GitHub issue links
        if: ${{ !contains(fromJSON(steps.pr.outputs.labels), 'skip-changes-check-all') && !contains(fromJSON(steps.pr.outputs.labels), 'skip-changes-check-jira') && !contains(fromJSON(steps.pr.outputs.labels), 'skip-changes-check-issue') && !contains(fromJSON(steps.pr.outputs.labels), 'renovate') && !contains(fromJSON(steps.pr.outputs.labels), 'dependencies') }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          FILENAME=$(grep -R 'changes' -e "pull/$PR_NUMBER" | head -1 | cut -d':' -f1)
          echo "Checking if $FILENAME contains a link to a GitHub issue - fail if it does not"
          if [ ! -z "$FILENAME" ]; then grep -qiE "github\.com/[^ ]+/issues/[0-9]+|(fixes|closes|resolves):?[[:space:]]+([a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+)?#[0-9]+" "$FILENAME"; fi
