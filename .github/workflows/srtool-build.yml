name: srtool Build (Deterministic WASM)
permissions: {}
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
      release-tag:
        description: "GitHub release tag to attach artifacts to (leave empty for workflow artifacts only)"
        required: false
        default: ""
      runtime-tag-release:
        description: "Runtime version tag (e.g. 1.0.0-rc.1) for versioned asset filenames"
        required: false
        default: ""

  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        required: true
        type: string
      release-tag:
        description: "GitHub release tag to attach artifacts to"
        required: false
        type: string
        default: ""
      runtime-tag-release:
        description: "Runtime version tag for versioned asset filenames"
        required: false
        type: string
        default: ""

jobs:
  srtool-build:
    name: Build deterministic WASM
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write       # Required for gh release upload
      id-token: write       # Required for GitHub native attestations
      attestations: write   # Required for GitHub native attestations
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          ref: ${{ inputs.ref }}

      - name: Setup Earthly
        uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Run srtool build
        run: |
          . ./.envrc && earthly +srtool-build

      - name: Rename WASM assets with version
        if: inputs.runtime-tag-release != ''
        env:
          RTAG: ${{ inputs.runtime-tag-release }}
        run: |
          cd artifacts/srtool || exit 1
          mv midnight_node_runtime.wasm "midnight_node_runtime-${RTAG}.wasm"
          mv midnight_node_runtime.compact.wasm "midnight_node_runtime-${RTAG}.compact.wasm"
          mv midnight_node_runtime.compact.compressed.wasm "midnight_node_runtime-${RTAG}.compact.compressed.wasm"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: srtool-wasm-${{ github.sha }}
          path: artifacts/srtool/
          retention-days: 90

      - name: Determine WASM filenames
        if: inputs.release-tag != ''
        id: wasm-names
        env:
          RTAG: ${{ inputs.runtime-tag-release }}
        run: |
          if [ -n "$RTAG" ]; then
            echo "wasm=midnight_node_runtime-${RTAG}.wasm" >> "$GITHUB_OUTPUT"
            echo "compact=midnight_node_runtime-${RTAG}.compact.wasm" >> "$GITHUB_OUTPUT"
            echo "compressed=midnight_node_runtime-${RTAG}.compact.compressed.wasm" >> "$GITHUB_OUTPUT"
          else
            echo "wasm=midnight_node_runtime.wasm" >> "$GITHUB_OUTPUT"
            echo "compact=midnight_node_runtime.compact.wasm" >> "$GITHUB_OUTPUT"
            echo "compressed=midnight_node_runtime.compact.compressed.wasm" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        if: inputs.release-tag != ''
        run: |
          cd artifacts/srtool || exit 1
          {
            sha256sum "${{ steps.wasm-names.outputs.wasm }}"
            sha256sum "${{ steps.wasm-names.outputs.compact }}"
            sha256sum "${{ steps.wasm-names.outputs.compressed }}"
          } >> SHA256SUMS-srtool

          echo "Generated checksums:"
          cat SHA256SUMS-srtool

      - name: Attest runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/srtool/${{ steps.wasm-names.outputs.wasm }}

      - name: Attest compact runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/srtool/${{ steps.wasm-names.outputs.compact }}

      - name: Attest compressed runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/srtool/${{ steps.wasm-names.outputs.compressed }}

      - name: Upload to GitHub release
        if: inputs.release-tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          cd artifacts/srtool || exit 1
          echo "Uploading srtool artifacts to release: $RELEASE_TAG"
          gh release upload --clobber --repo "$GITHUB_REPOSITORY" "$RELEASE_TAG" \
            "${{ steps.wasm-names.outputs.wasm }}" \
            "${{ steps.wasm-names.outputs.compact }}" \
            "${{ steps.wasm-names.outputs.compressed }}" \
            srtool-digest.json \
            SHA256SUMS-srtool
