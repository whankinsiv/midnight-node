name: srtool Build (Deterministic WASM)
permissions: {}
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
      release-tag:
        description: "GitHub release tag to attach artifacts to (leave empty for workflow artifacts only)"
        required: false
        default: ""

  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        required: true
        type: string
      release-tag:
        description: "GitHub release tag to attach artifacts to"
        required: false
        type: string
        default: ""

jobs:
  srtool-build:
    name: Build deterministic WASM
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write       # Required for gh release upload
      id-token: write       # Required for GitHub native attestations
      attestations: write   # Required for GitHub native attestations
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Earthly
        uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Run srtool build
        run: |
          . ./.envrc && earthly +srtool-build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: srtool-wasm-${{ github.sha }}
          path: artifacts/srtool/
          retention-days: 90

      - name: Generate checksums
        if: inputs.release-tag != ''
        run: |
          cd artifacts/srtool || exit 1
          {
            sha256sum midnight_node_runtime.wasm
            sha256sum midnight_node_runtime.compact.wasm
            sha256sum midnight_node_runtime.compact.compressed.wasm
            sha256sum srtool-digest.json
          } >> SHA256SUMS-srtool

          echo "Generated checksums:"
          cat SHA256SUMS-srtool

      - name: Attest runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: artifacts/srtool/midnight_node_runtime.wasm

      - name: Attest compact runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: artifacts/srtool/midnight_node_runtime.compact.wasm

      - name: Attest compressed runtime WASM
        if: inputs.release-tag != ''
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: artifacts/srtool/midnight_node_runtime.compact.compressed.wasm

      - name: Upload to GitHub release
        if: inputs.release-tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          cd artifacts/srtool || exit 1
          echo "Uploading srtool artifacts to release: $RELEASE_TAG"
          gh release upload --clobber --repo "$GITHUB_REPOSITORY" "$RELEASE_TAG" \
            midnight_node_runtime.wasm \
            midnight_node_runtime.compact.wasm \
            midnight_node_runtime.compact.compressed.wasm \
            srtool-digest.json \
            SHA256SUMS-srtool
