name: Check PR

on:
  merge_group:
  pull_request:
    branches: ["**"]

# no top level default permissions for security reasons
permissions: {}

jobs:
  run:
    name: Check PR job
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout node repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          submodules: true

      - name: Check if node image tag was incremented
        env:
          GHCR_SECRET: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
        run: |
          NODE_CRATE_VERSION=$(cat ./node/Cargo.toml | grep version | head -1 | awk -F'"' '{print $2}')
          export NODE_CRATE_VERSION
          echo "NODE_CRATE_VERSION=$NODE_CRATE_VERSION" >> "$GITHUB_ENV"
          GHCR_TOKEN=$(echo "$GHCR_SECRET" | base64)
          export GHCR_TOKEN
          TAGS_RESPONSE=$(curl -H "Authorization: Bearer $GHCR_TOKEN" https://ghcr.io/v2/midnight-ntwrk/midnight-node/tags/list)
          export TAGS_RESPONSE

          # Check list of tags to see if any existing tags have the node crate version
          if echo "$TAGS_RESPONSE" | jq --arg node_crate_version "$NODE_CRATE_VERSION" -e '.tags | contains([$node_crate_version])' > /dev/null; then
              echo "VERSION_EXISTS=true"
          else
              echo "VERSION_EXISTS=false"
          fi

      - name: Comment On PR with Node Version Bump Reminder
        if: env.VERSION_EXISTS == 'true'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        id: bump-node-version
        with:
          message: |
            :warning: Node version ${{ env.NODE_CRATE_VERSION }} already exists. Node Version may need to be bumped if you wish to release node functionality.
