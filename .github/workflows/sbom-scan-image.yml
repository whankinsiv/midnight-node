name: SBOM Generation and Vulnerability Scan

# This workflow generates SBOMs (Software Bill of Materials) using Syft,
# scans for vulnerabilities using Grype, and attests the SBOM to the image
# using Cosign keyless signing.
#
# To verify signatures and attestations locally:
#
#   # Verify image signature
#   cosign verify ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --certificate-identity-regexp '.*' \
#     --certificate-oidc-issuer-regexp '.*'
#
#   # Verify SBOM attestation
#   cosign verify-attestation --type spdxjson \
#     ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --certificate-identity-regexp '.*' \
#     --certificate-oidc-issuer-regexp '.*'
#
#   # Download and view the SBOM
#   cosign download attestation ghcr.io/midnight-ntwrk/midnight-node:TAG | \
#     jq -r '.payload' | base64 -d | jq '.predicate'

on:
  workflow_call:
    inputs:
      image:
        description: 'Full image reference (registry/name:tag)'
        required: true
        type: string
      sbom-artifact-name:
        description: 'Name for the SBOM artifact'
        required: true
        type: string
      severity-cutoff:
        description: 'Minimum severity to fail on (negligible, low, medium, high, critical)'
        default: 'critical'
        type: string
      skip-attestation:
        description: 'Skip SBOM attestation (e.g., for fork PRs)'
        default: false
        type: boolean

# no top level default permissions for security reasons
permissions: {}

jobs:
  sbom-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # For attestation
      id-token: write      # Required for keyless signing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
        with:
          sparse-checkout: |
            .github/scripts
            .grype.yaml

      - name: Install Cosign
        if: ${{ !inputs.skip-attestation }}
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@deef08a0db64bfad603422135db61477b16cef56 # v0.22.1

      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@8d2fce09422cd6037e577f4130e9b925e9a37175 # v7.3.1

      - name: Add tools to PATH
        run: |
          # Add syft and grype binary directories to PATH
          dirname "${{ steps.syft.outputs.cmd }}" >> "$GITHUB_PATH"
          dirname "${{ steps.grype.outputs.cmd }}" >> "$GITHUB_PATH"

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Generate SBOM
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          source .github/scripts/sbom-scan.sh
          generate_sbom_with_retry "${IMAGE}" "sbom.spdx.json"

      - name: Scan for vulnerabilities
        id: scan
        env:
          IMAGE: ${{ inputs.image }}
          SEVERITY_CUTOFF: ${{ inputs.severity-cutoff }}
        run: |
          source .github/scripts/sbom-scan.sh
          scan_image_with_retry "${IMAGE}" "${SEVERITY_CUTOFF}" "grype-results.json"

      - name: Attest SBOM
        if: ${{ !inputs.skip-attestation }}
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          source .github/scripts/sbom-scan.sh
          attest_sbom_with_retry "${IMAGE}" "sbom.spdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.sbom-artifact-name }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.sbom-artifact-name }}-scan-results
          path: grype-results.json
          retention-days: 90
          if-no-files-found: ignore
