name: SBOM Generation and Vulnerability Scan

# This workflow generates SBOMs (Software Bill of Materials) using Syft,
# scans for vulnerabilities using Grype, and attests the SBOM to the image
# using GitHub native attestations.
#
# To verify attestations locally:
#
#   # Verify build provenance
#   gh attestation verify oci://ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --repo midnightntwrk/midnight-node
#
#   # Verify SBOM attestation
#   gh attestation verify oci://ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --repo midnightntwrk/midnight-node \
#     --predicate-type https://spdx.dev/Document

on:
  workflow_call:
    inputs:
      image:
        description: 'Full image reference (registry/name:tag)'
        required: true
        type: string
      sbom-artifact-name:
        description: 'Name for the SBOM artifact'
        required: true
        type: string
      platform:
        description: 'Platform to pull (e.g., linux/arm64). Required for manifest-list images on cross-platform runners.'
        default: ''
        type: string
      severity-cutoff:
        description: 'Minimum severity to fail on (negligible, low, medium, high, critical)'
        default: 'critical'
        type: string
      skip-attestation:
        description: 'Skip SBOM attestation (e.g., for fork PRs)'
        default: false
        type: boolean
      multi-arch-image:
        description: 'Multi-arch image to also attest SBOM against (e.g., registry/name:tag). Enables gh attestation verify on multi-arch tags.'
        default: ''
        type: string

# no top level default permissions for security reasons
permissions: {}

jobs:
  sbom-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write  # Required for GitHub native attestations
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          sparse-checkout: |
            .github/scripts
            .grype.yaml

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0

      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2

      - name: Add tools to PATH
        run: |
          # Add syft and grype binary directories to PATH
          dirname "${{ steps.syft.outputs.cmd }}" >> "$GITHUB_PATH"
          dirname "${{ steps.grype.outputs.cmd }}" >> "$GITHUB_PATH"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE && 'MidnightCI' || github.actor }}
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE || github.token }}

      - name: Login to DockerHub
        if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Generate SBOM
        env:
          IMAGE: ${{ inputs.image }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          source .github/scripts/sbom-scan.sh
          generate_sbom_with_retry "${IMAGE}" "sbom.spdx.json" "${PLATFORM}"

      - name: Scan for vulnerabilities
        id: scan
        env:
          IMAGE: ${{ inputs.image }}
          SEVERITY_CUTOFF: ${{ inputs.severity-cutoff }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          source .github/scripts/sbom-scan.sh
          scan_image_with_retry "${IMAGE}" "${SEVERITY_CUTOFF}" "grype-results.json" "${PLATFORM}"

      - name: Trim SBOM for attestation
        if: ${{ !inputs.skip-attestation }}
        run: |
          source .github/scripts/sbom-scan.sh
          trim_sbom_for_attestation "sbom.spdx.json" "sbom-attestation.spdx.json"

      - name: Get image digest
        if: ${{ !inputs.skip-attestation }}
        id: image-digest
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

          # Extract subject name (registry/repo without tag or digest)
          SUBJECT="${IMAGE%%:*}"
          SUBJECT="${SUBJECT%%@*}"

          # Normalize Docker Hub short names to index.docker.io prefix
          REGISTRY="${SUBJECT%%/*}"
          if [[ "${REGISTRY}" != *.* ]]; then
            SUBJECT="index.docker.io/${SUBJECT}"
          fi
          echo "subject-name=${SUBJECT}" >> "$GITHUB_OUTPUT"

      - name: Attest SBOM
        if: ${{ !inputs.skip-attestation }}
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-name: ${{ steps.image-digest.outputs.subject-name }}
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          sbom-path: sbom-attestation.spdx.json

      - name: Get multi-arch image digest
        if: ${{ !inputs.skip-attestation && inputs.multi-arch-image != '' }}
        id: multiarch-digest
        env:
          MULTIARCH_IMAGE: ${{ inputs.multi-arch-image }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "${MULTIARCH_IMAGE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

          SUBJECT="${MULTIARCH_IMAGE%%:*}"
          SUBJECT="${SUBJECT%%@*}"
          REGISTRY="${SUBJECT%%/*}"
          if [[ "${REGISTRY}" != *.* ]]; then
            SUBJECT="index.docker.io/${SUBJECT}"
          fi
          echo "subject-name=${SUBJECT}" >> "$GITHUB_OUTPUT"

      - name: Attest SBOM to multi-arch manifest
        if: ${{ !inputs.skip-attestation && inputs.multi-arch-image != '' }}
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-name: ${{ steps.multiarch-digest.outputs.subject-name }}
          subject-digest: ${{ steps.multiarch-digest.outputs.digest }}
          sbom-path: sbom-attestation.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.sbom-artifact-name }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.sbom-artifact-name }}-scan-results
          path: grype-results.json
          retention-days: 90
          if-no-files-found: ignore
