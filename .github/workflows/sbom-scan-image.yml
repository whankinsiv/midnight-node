name: SBOM Generation and Vulnerability Scan

# This workflow generates SBOMs (Software Bill of Materials) using Syft,
# scans for vulnerabilities using Grype, and attests the SBOM to the image
# using Cosign keyless signing.
#
# To verify signatures and attestations locally:
#
#   # Verify image signature
#   cosign verify ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --certificate-identity-regexp '.*' \
#     --certificate-oidc-issuer-regexp '.*'
#
#   # Verify SBOM attestation
#   cosign verify-attestation --type spdxjson \
#     ghcr.io/midnight-ntwrk/midnight-node:TAG \
#     --certificate-identity-regexp '.*' \
#     --certificate-oidc-issuer-regexp '.*'
#
#   # Download and view the SBOM
#   cosign download attestation ghcr.io/midnight-ntwrk/midnight-node:TAG | \
#     jq -r '.payload' | base64 -d | jq '.predicate'

on:
  workflow_call:
    inputs:
      image:
        description: 'Full image reference (registry/name:tag)'
        required: true
        type: string
      sbom-artifact-name:
        description: 'Name for the SBOM artifact'
        required: true
        type: string
      platform:
        description: 'Platform to pull (e.g., linux/arm64). Required for manifest-list images on cross-platform runners.'
        default: ''
        type: string
      severity-cutoff:
        description: 'Minimum severity to fail on (negligible, low, medium, high, critical)'
        default: 'critical'
        type: string
      skip-scan:
        description: 'Skip Grype vulnerability scan (use when image layers were already scanned from another registry)'
        default: false
        type: boolean
      skip-attestation:
        description: 'Skip SBOM attestation (e.g., for fork PRs)'
        default: false
        type: boolean
      multi-arch-image:
        description: 'Multi-arch image to also attest SBOM against (e.g., registry/name:tag). Enables cosign verify-attestation on multi-arch tags.'
        default: ''
        type: string
      tlog-upload:
        description: 'Upload attestation to the Sigstore transparency log (Rekor). Set to false for non-release builds.'
        default: true
        type: boolean

# no top level default permissions for security reasons
permissions: {}

jobs:
  sbom-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # For attestation
      id-token: write      # Required for keyless signing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true
          sparse-checkout: |
            .github/scripts
            .grype.yaml

      - name: Install Cosign
        if: ${{ !inputs.skip-attestation }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      - name: Install Grype
        if: ${{ !inputs.skip-scan }}
        id: grype
        uses: anchore/scan-action/download-grype@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2

      - name: Add Syft to PATH
        run: |
          dirname "${{ steps.syft.outputs.cmd }}" >> "$GITHUB_PATH"

      - name: Add Grype to PATH
        if: ${{ !inputs.skip-scan }}
        run: |
          dirname "${{ steps.grype.outputs.cmd }}" >> "$GITHUB_PATH"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE && 'MidnightCI' || github.actor }}
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE || github.token }}

      - name: Login to DockerHub
        if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Generate SBOM
        env:
          IMAGE: ${{ inputs.image }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          source .github/scripts/sbom-scan.sh
          generate_sbom_with_retry "${IMAGE}" "sbom.spdx.json" "${PLATFORM}"

      - name: Scan for vulnerabilities
        if: ${{ !inputs.skip-scan }}
        id: scan
        env:
          IMAGE: ${{ inputs.image }}
          SEVERITY_CUTOFF: ${{ inputs.severity-cutoff }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          source .github/scripts/sbom-scan.sh
          scan_image_with_retry "${IMAGE}" "${SEVERITY_CUTOFF}" "grype-results.json" "${PLATFORM}"

      - name: Trim SBOM for attestation
        if: ${{ !inputs.skip-attestation }}
        run: |
          source .github/scripts/sbom-scan.sh
          trim_sbom_for_attestation "sbom.spdx.json" "sbom-attestation.spdx.json"

      - name: Attest SBOM
        if: ${{ !inputs.skip-attestation }}
        env:
          IMAGE: ${{ inputs.image }}
          TLOG_UPLOAD: ${{ inputs.tlog-upload }}
        run: |
          source .github/scripts/sbom-scan.sh
          attest_sbom_with_retry "${IMAGE}" "sbom-attestation.spdx.json" "${TLOG_UPLOAD}"

      - name: Attest SBOM to multi-arch manifest
        if: ${{ !inputs.skip-attestation && inputs.multi-arch-image != '' }}
        env:
          MULTIARCH_IMAGE: ${{ inputs.multi-arch-image }}
          TLOG_UPLOAD: ${{ inputs.tlog-upload }}
        run: |
          source .github/scripts/sbom-scan.sh
          attest_sbom_to_multiarch "${MULTIARCH_IMAGE}" "sbom-attestation.spdx.json" "${TLOG_UPLOAD}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.sbom-artifact-name }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Upload scan results
        if: ${{ always() && !inputs.skip-scan }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.sbom-artifact-name }}-scan-results
          path: grype-results.json
          retention-days: 90
          if-no-files-found: ignore
