name: Create Release (Re-tag image and create Github release)

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write  # Required for keyless signing with Cosign

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The git ref to release (branch, tag, or commit SHA)"
        required: true
        default: "main"
      suffix:
        description: 'Optional suffix (e.g. "-rc.1" or "-beta.1") to append to the image tag'
        required: false
        default: ""
      release-type:
        description: "Github release type?"
        required: false
        default: "latest"
        type: choice
        options:
          - "Don't create a release."
          - draft
          - prerelease
          - latest
      force:
        type: boolean
        description: "Force release if it already exists?"
        required: true
        default: false

jobs:
  prepare-release:
    name: Prepare release images
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.export_tag.outputs.release_tag }}
      commit_tag: ${{ steps.export_tag.outputs.commit_tag }}
    env:
      FORCE_COLOR: 1
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  #v3.7.0

        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Checkout Season action repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: midnightntwrk/season-action
          ref: 1666b2819e86ffd23f187a3e854e32311a768161 # 0.4.2
          path: season-action
          token: ${{ secrets.MIDNIGHTCI_REPO }}

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ inputs.ref }}
          path: ./.tmp-package

      - name: Setup Season
        uses: ./season-action
        with:
          ghcr_registry: ghcr.io/midnight-ntwrk
          ghcr_username: MidnightCI
          ghcr_password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          suffix: ${{ github.event.inputs.suffix }}
          tag_name: node
          image_name: midnight-node
          cargo_toml_path: node/Cargo.toml
          changes_archive_dir: .changes_archive
          repo_root: ./.tmp-package

      - name: Retag and push release images (GHCR)
        working-directory: ./.tmp-package
        shell: bash
        env:
          FORCE: ${{ github.event.inputs.force }}
        run: |
          season-retag
          SEASON_IMAGE_NAME=midnight-node-toolkit season-retag

      - name: Checkout node repository (for signing script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          path: ./.tmp-node-scripts
          sparse-checkout: .github/scripts

      - name: Sign release images (GHCR)
        run: |
          if [ -z "${SEASON_IMAGE_TAG_RELEASE:-}" ]; then
            echo "::error::SEASON_IMAGE_TAG_RELEASE is not set"
            exit 1
          fi

          source ./.tmp-node-scripts/.github/scripts/sign-image.sh

          # Sign multi-arch manifests (signs all platform digests)
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}"
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}"

      - name: Create release images (GHCR midnightntwrk)
        run: |
          for IMAGE in midnight-node midnight-node-toolkit; do
            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_RELEASE}" \
              "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_COMMIT}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_COMMIT}-arm64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_RELEASE}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_COMMIT}-amd64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_RELEASE}-arm64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${SEASON_IMAGE_TAG_COMMIT}-arm64"
          done

      - name: Sign release images (GHCR midnightntwrk)
        run: |
          source ./.tmp-node-scripts/.github/scripts/sign-image.sh
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}"
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}"

      - name: Retag and push release images (Docker Hub)
        run: |
          export IMAGE_TAG="$SEASON_IMAGE_TAG_COMMIT"
          export RELEASE_TAG="$SEASON_IMAGE_TAG_RELEASE"

          echo "Creating manifests for node/toolkit from $SEASON_IMAGE_TAG_COMMIT images"
          docker pull ghcr.io/midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_COMMIT}-amd64
          docker pull ghcr.io/midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_COMMIT}-arm64
          docker pull ghcr.io/midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_COMMIT}-amd64
          docker pull ghcr.io/midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_COMMIT}-arm64

          echo "Tagging each image with $SEASON_IMAGE_TAG_RELEASE"
          docker tag ghcr.io/midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_COMMIT}-amd64 midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-amd64
          docker tag ghcr.io/midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_COMMIT}-arm64 midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-arm64
          docker tag ghcr.io/midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_COMMIT}-amd64 midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-amd64
          docker tag ghcr.io/midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_COMMIT}-arm64 midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-arm64

          echo "Push ${SEASON_IMAGE_TAG_RELEASE} images to Docker Hub"
          docker push midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-amd64
          docker push midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-arm64
          docker push midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-amd64
          docker push midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-arm64

          echo "Create multi-arch manifests for Docker Hub"
          docker manifest create midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE} \
            midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-amd64 \
            midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}-arm64

          docker manifest create midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE} \
            midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-amd64 \
            midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}-arm64

          echo "Push manifests to Docker Hub"
          docker manifest push midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}
          docker manifest push midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}

      - name: Sign release images (Docker Hub)
        run: |
          if [ -z "${SEASON_IMAGE_TAG_RELEASE:-}" ]; then
            echo "::error::SEASON_IMAGE_TAG_RELEASE is not set"
            exit 1
          fi

          source ./.tmp-node-scripts/.github/scripts/sign-image.sh

          # Sign multi-arch manifests (signs all platform digests)
          sign_with_retry "midnightntwrk/midnight-node:${SEASON_IMAGE_TAG_RELEASE}"
          sign_with_retry "midnightntwrk/midnight-node-toolkit:${SEASON_IMAGE_TAG_RELEASE}"

      - name: Export release tag
        id: export_tag
        run: |
          echo "release_tag=${SEASON_IMAGE_TAG_RELEASE}" >> $GITHUB_OUTPUT
          echo "commit_tag=${SEASON_IMAGE_TAG_COMMIT}" >> $GITHUB_OUTPUT

  # SBOM scan jobs run here (defined below) - they depend on prepare-release
  # and gate finalize-release

  finalize-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare-release, sbom-scan-ghcr-node, sbom-scan-ghcr-toolkit, sbom-scan-dockerhub-node, sbom-scan-dockerhub-toolkit, sbom-scan-midnightntwrk-node, sbom-scan-midnightntwrk-toolkit]
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout Season action repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: midnightntwrk/season-action
          ref: 1666b2819e86ffd23f187a3e854e32311a768161 # 0.4.2
          path: season-action
          token: ${{ secrets.MIDNIGHTCI_REPO }}

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ inputs.ref }}
          path: ./.tmp-package

      - name: Setup Season
        uses: ./season-action
        with:
          ghcr_registry: ghcr.io/midnight-ntwrk
          ghcr_username: MidnightCI
          ghcr_password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          suffix: ${{ github.event.inputs.suffix }}
          tag_name: node
          image_name: midnight-node
          cargo_toml_path: node/Cargo.toml
          changes_archive_dir: .changes_archive
          repo_root: ./.tmp-package

      - name: Build Release Notes
        working-directory: ./.tmp-package
        shell: bash
        run: |
          export SEASON_GHCR_REGISTRY="midnightntwrk"
          export SEASON_VAR_NODE_DOCKER_IMAGE="$SEASON_GHCR_REGISTRY/$SEASON_IMAGE_NAME:$SEASON_IMAGE_TAG_RELEASE"
          export SEASON_VAR_TOOLKIT_DOCKER_IMAGE="$SEASON_GHCR_REGISTRY/midnight-node-toolkit:$SEASON_IMAGE_TAG_RELEASE"
          export SEASON_VAR_RELEASE_TAG="$SEASON_GIT_TAG"
          season-build-release-notes

      - name: Create tag
        working-directory: ./.tmp-package
        shell: bash
        id: tag-commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: season-create-tag

      - name: Create release
        shell: bash
        working-directory: ./.tmp-package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}
        run: |
          season-create-release

      - name: Export tags for downstream jobs
        id: export-tags
        run: |
          echo "release_tag=$SEASON_GIT_TAG" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SEASON_IMAGE_TAG_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Make PR against main
        working-directory: ./.tmp-package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: season-create-pr

  create-release-assets:
    runs-on: ubuntu-latest
    needs: [finalize-release, prepare-release]
    if: github.event.inputs.release-type != 'Don''t create a release.'
    strategy:
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: Checkout (for signing script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  #v3.7.0

        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Extract files from Docker images
        id: extract
        run: |
          IMAGE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          RELEASE_TAG="node-${IMAGE_TAG}"
          PLATFORM="${{ matrix.platform }}"

          echo "Release tag: $RELEASE_TAG"
          echo "Image tag: $IMAGE_TAG"
          echo "Platform: $PLATFORM"

          # Extract midnight-node
          NODE_IMAGE="ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}"
          NODE_RELEASE="midnight-node-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"

          echo "Extracting from: $NODE_IMAGE"
          docker pull --platform "linux/${PLATFORM}" "$NODE_IMAGE"
          CONTAINER_ID=$(docker create --platform "linux/${PLATFORM}" "$NODE_IMAGE")
          docker cp "$CONTAINER_ID:/midnight-node" ./
          docker cp "$CONTAINER_ID:/res" ./
          docker rm "$CONTAINER_ID"
          tar -czf "$NODE_RELEASE" midnight-node res
          rm -rf midnight-node res
          echo "Created: $NODE_RELEASE"

          # Extract midnight-node-toolkit
          TOOLKIT_IMAGE="ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}"
          TOOLKIT_RELEASE="midnight-node-toolkit-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"

          echo "Extracting from: $TOOLKIT_IMAGE"
          docker pull --platform "linux/${PLATFORM}" "$TOOLKIT_IMAGE"
          CONTAINER_ID=$(docker create --platform "linux/${PLATFORM}" "$TOOLKIT_IMAGE")
          docker cp "$CONTAINER_ID:/midnight-node-toolkit" ./
          docker rm "$CONTAINER_ID"
          tar -czf "$TOOLKIT_RELEASE" midnight-node-toolkit
          rm -rf midnight-node-toolkit
          echo "Created: $TOOLKIT_RELEASE"

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "node_release=$NODE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "toolkit_release=$TOOLKIT_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          sha256sum ${{ steps.extract.outputs.node_release }} >> SHA256SUMS-${{ matrix.platform }}
          sha256sum ${{ steps.extract.outputs.toolkit_release }} >> SHA256SUMS-${{ matrix.platform }}
          echo "Generated checksums:"
          cat SHA256SUMS-${{ matrix.platform }}

      - name: Sign binary archives
        run: |
          source .github/scripts/sign-binary.sh

          sign_blob_with_retry "${{ steps.extract.outputs.node_release }}"
          sign_blob_with_retry "${{ steps.extract.outputs.toolkit_release }}"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.extract.outputs.release_tag }}"
          NODE_FILE="${{ steps.extract.outputs.node_release }}"
          TOOLKIT_FILE="${{ steps.extract.outputs.toolkit_release }}"

          echo "Uploading assets to release: $RELEASE_TAG"
          gh release upload --repo "$GITHUB_REPOSITORY" "$RELEASE_TAG" \
            "$NODE_FILE" "${NODE_FILE}.bundle" \
            "$TOOLKIT_FILE" "${TOOLKIT_FILE}.bundle" \
            "SHA256SUMS-${{ matrix.platform }}"

  finalize-checksums:
    needs: [prepare-release, create-release-assets]
    runs-on: ubuntu-latest
    if: github.event.inputs.release-type != 'Don''t create a release.'
    steps:
      - name: Checkout (for signing script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Download and combine checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: node-${{ needs.prepare-release.outputs.release_tag }}
        run: |
          echo "Downloading checksum files from release: $RELEASE_TAG"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "SHA256SUMS-*"

          # Combine into single file
          echo "Combining checksums:"
          cat SHA256SUMS-* | sort > SHA256SUMS
          cat SHA256SUMS

          # Remove individual platform files from release
          echo "Removing per-platform checksum files from release..."
          for f in SHA256SUMS-*; do
            gh release delete-asset "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" "$f" --yes
          done

      - name: Sign checksums file
        run: |
          source .github/scripts/sign-binary.sh
          sign_blob_with_retry SHA256SUMS

      - name: Upload final checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: node-${{ needs.prepare-release.outputs.release_tag }}
        run: |
          echo "Uploading signed checksums to release: $RELEASE_TAG"
          gh release upload --repo "$GITHUB_REPOSITORY" "$RELEASE_TAG" \
            SHA256SUMS \
            SHA256SUMS.bundle

  sbom-scan-ghcr-node:
    name: SBOM/Scan Node GHCR (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      # GHCR only has arch-specific tags with commit tag (season-retag creates multi-arch release tag only)
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.prepare-release.outputs.commit_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-ghcr-${{ matrix.arch }}-release
    secrets: inherit

  sbom-scan-ghcr-toolkit:
    name: SBOM/Scan Toolkit GHCR (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      # GHCR only has arch-specific tags with commit tag (season-retag creates multi-arch release tag only)
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.commit_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-ghcr-${{ matrix.arch }}-release
    secrets: inherit

  sbom-scan-dockerhub-node:
    name: SBOM/Scan Node Docker Hub (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.release_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-dockerhub-${{ matrix.arch }}-release
    secrets: inherit

  sbom-scan-dockerhub-toolkit:
    name: SBOM/Scan Toolkit Docker Hub (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.release_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-dockerhub-${{ matrix.arch }}-release
    secrets: inherit

  sbom-scan-midnightntwrk-node:
    name: SBOM/Scan Node midnightntwrk (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.release_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-midnightntwrk-${{ matrix.arch }}-release
      platform: linux/${{ matrix.arch }}
      multi-arch-image: ghcr.io/midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  sbom-scan-midnightntwrk-toolkit:
    name: SBOM/Scan Toolkit midnightntwrk (${{ matrix.arch }})
    needs: [prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.release_tag }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-midnightntwrk-${{ matrix.arch }}-release
      platform: linux/${{ matrix.arch }}
      multi-arch-image: ghcr.io/midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit
