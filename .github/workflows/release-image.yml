name: Create Release (Re-tag image and create Github release)

# no top level default permissions for security reasons
permissions: {}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The git ref to release (branch, tag, or commit SHA)"
        required: true
        default: "main"
      suffix:
        description: 'Optional suffix (e.g. "-rc.1" or "-beta.1") to append to the image tag'
        required: false
        default: ""
      release-type:
        description: "Github release type?"
        required: false
        default: "latest"
        type: choice
        options:
          - "Don't create a release."
          - draft
          - prerelease
          - latest
      force:
        type: boolean
        description: "Force release if it already exists?"
        required: true
        default: false
      skip-node:
        type: boolean
        description: "Skip node image release?"
        required: false
        default: false
      skip-toolkit:
        type: boolean
        description: "Skip toolkit image release?"
        required: false
        default: false
      skip-runtime:
        type: boolean
        description: "Skip srtool runtime WASM build?"
        required: false
        default: false
      archive-changes:
        type: boolean
        description: 'Archive changes for this release on the main branch'
        required: true
        default: true
      archive-mode:
        type: choice
        options:
          - move
          - copy
          - delete
        description: 'Archive changes for this release on the main branch'
        required: true
        default: move
      bump-version:
        type: boolean
        description: 'Bump components version on main'
        required: true
        default: false
      reset-changes:
        type: boolean
        description: 'Reset `changes/` to the change template'
        required: true
        default: true

jobs:
  validate-inputs:
    permissions:
      contents: read
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check at least one component is selected
        if: inputs.skip-node == true && inputs.skip-toolkit == true && inputs.skip-runtime == true
        run: |
          echo "::error::At least one component must be selected for release. All three skip flags are set."
          exit 1

  prepare-release:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: Prepare release images
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    outputs:
      node-version: ${{ steps.release-env.outputs.node_version }}
      image-tag-content-hash: ${{ steps.release-env.outputs.image_tag_content_hash }}
      image-tag-release: ${{ steps.release-env.outputs.image_tag_release }}
      release-sha: ${{ steps.release-env.outputs.release_sha }}
      git-tag-release: ${{ steps.release-config.outputs.git_tag_release }}
      git-tag-node: ${{ steps.release-config.outputs.git_tag_node }}
      git-tag-toolkit: ${{ steps.release-config.outputs.git_tag_toolkit }}
      git-tag-runtime: ${{ steps.release-config.outputs.git_tag_runtime }}
      toolkit-version: ${{ steps.release-env.outputs.toolkit_version }}
      toolkit-tag-release: ${{ steps.release-env.outputs.toolkit_tag_release }}
      runtime-version: ${{ steps.release-env.outputs.runtime_version }}
      runtime-tag-release: ${{ steps.release-env.outputs.runtime_tag_release }}
    env:
      FORCE_COLOR: 1
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0

        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true
          ref: ${{ inputs.ref }}
          path: ./.tmp-package

      - name: Setup Env
        id: release-env
        shell: bash
        env:
          SUFFIX: ${{ github.event.inputs.suffix }}
        working-directory: ./.tmp-package
        run: |
          NODE_VERSION="$(grep -m 1 'version =' node/Cargo.toml | awk '{print $3}' | tr -d '"')"
          TOOLKIT_VERSION="$(grep -m 1 'version =' util/toolkit/Cargo.toml | awk '{print $3}' | tr -d '"')"

          # Extract runtime spec_version (e.g. 001_000_000 -> 1.0.0)
          SPEC_VERSION_RAW="$(grep -m 1 'spec_version:' runtime/src/lib.rs | awk '{print $2}' | tr -d ',')"
          MAJOR=$((10#$(echo "$SPEC_VERSION_RAW" | sed 's/_//g' | sed 's/^\([0-9]\{3\}\).*/\1/')))
          MINOR=$((10#$(echo "$SPEC_VERSION_RAW" | sed 's/_//g' | sed 's/^[0-9]\{3\}\([0-9]\{3\}\).*/\1/')))
          PATCH=$((10#$(echo "$SPEC_VERSION_RAW" | sed 's/_//g' | sed 's/^[0-9]\{6\}\([0-9]\{3\}\).*/\1/')))
          RUNTIME_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          CONTENT_HASH=$(git rev-parse "HEAD^{tree}" | cut -c1-12)
          IMAGE_TAG_CONTENT_HASH="$NODE_VERSION-$CONTENT_HASH"
          IMAGE_TAG_RELEASE="$NODE_VERSION$SUFFIX"
          TOOLKIT_TAG_RELEASE="$TOOLKIT_VERSION$SUFFIX"
          RUNTIME_TAG_RELEASE="$RUNTIME_VERSION$SUFFIX"

          # Resolve inputs.ref to a concrete commit SHA so every downstream
          # tag/release points at the exact tree we just built from.
          RELEASE_SHA="$(git rev-parse HEAD)"

          # Job outputs (for downstream jobs)
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          echo "toolkit_version=$TOOLKIT_VERSION" >> "$GITHUB_OUTPUT"
          echo "runtime_version=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "image_tag_content_hash=$IMAGE_TAG_CONTENT_HASH" >> "$GITHUB_OUTPUT"
          echo "image_tag_release=$IMAGE_TAG_RELEASE" >> "$GITHUB_OUTPUT"
          echo "toolkit_tag_release=$TOOLKIT_TAG_RELEASE" >> "$GITHUB_OUTPUT"
          echo "runtime_tag_release=$RUNTIME_TAG_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

          # Env vars (for subsequent steps in this job)
          echo "NODE_VERSION=$NODE_VERSION" >> "$GITHUB_ENV"
          echo "TOOLKIT_VERSION=$TOOLKIT_VERSION" >> "$GITHUB_ENV"
          echo "RUNTIME_VERSION=$RUNTIME_VERSION" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_CONTENT_HASH=$IMAGE_TAG_CONTENT_HASH" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_RELEASE=$IMAGE_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "TOOLKIT_TAG_RELEASE=$TOOLKIT_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "RUNTIME_TAG_RELEASE=$RUNTIME_TAG_RELEASE" >> "$GITHUB_ENV"

      - name: Compute release configuration
        id: release-config
        env:
          SKIP_NODE: ${{ inputs.skip-node }}
          SKIP_TOOLKIT: ${{ inputs.skip-toolkit }}
          SKIP_RUNTIME: ${{ inputs.skip-runtime }}
          SUFFIX: ${{ github.event.inputs.suffix }}
        run: |
          # Create separate git tags for each component (e.g. node-1.0.0-rc.1, toolkit-1.0.0-rc.1)
          # The primary release tag is the node tag for backwards compatibility with downstream consumers
          if [ "$SKIP_NODE" != "true" ]; then
            echo "git_tag_node=node-${NODE_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$SKIP_TOOLKIT" != "true" ]; then
            echo "git_tag_toolkit=toolkit-${TOOLKIT_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$SKIP_RUNTIME" != "true" ]; then
            echo "git_tag_runtime=runtime-${RUNTIME_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          fi
          # Primary release tag is node tag for backwards compatibility
          if [ "$SKIP_NODE" != "true" ]; then
            echo "git_tag_release=node-${NODE_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          elif [ "$SKIP_TOOLKIT" != "true" ]; then
            echo "git_tag_release=toolkit-${TOOLKIT_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          elif [ "$SKIP_RUNTIME" != "true" ]; then
            echo "git_tag_release=runtime-${RUNTIME_VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
          fi

      # --- Node image retag (GHCR) ---
      - name: Retag and push node release images (GHCR)
        if: inputs.skip-node != true
        run: |
          docker buildx imagetools create --tag \
            ghcr.io/midnight-ntwrk/midnight-node:$IMAGE_TAG_RELEASE \
            ghcr.io/midnight-ntwrk/midnight-node:$IMAGE_TAG_CONTENT_HASH

      # --- Toolkit image retag (GHCR) ---
      - name: Retag and push toolkit release images (GHCR)
        if: inputs.skip-toolkit != true
        run: |
          docker buildx imagetools create --tag \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:$TOOLKIT_TAG_RELEASE \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:$IMAGE_TAG_CONTENT_HASH

      # --- GHCR digests ---
      - name: Get GHCR node release image digest
        if: inputs.skip-node != true
        id: ghcr-digests-node
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Get GHCR toolkit release image digest
        if: inputs.skip-toolkit != true
        id: ghcr-digests-toolkit
        run: |
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      # --- GHCR attestations ---
      - name: Attest node release image (GHCR)
        if: inputs.skip-node != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node
          subject-digest: ${{ steps.ghcr-digests-node.outputs.digest }}

      - name: Attest toolkit release image (GHCR)
        if: inputs.skip-toolkit != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.ghcr-digests-toolkit.outputs.digest }}

      # --- GHCR midnightntwrk images ---
      - name: Create node release images (GHCR midnightntwrk)
        if: inputs.skip-node != true
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}" \
            "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-amd64" \
            "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-arm64"

          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-amd64" \
            "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-amd64"

          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-arm64" \
            "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-arm64"

      - name: Create toolkit release images (GHCR midnightntwrk)
        if: inputs.skip-toolkit != true
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}" \
            "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-amd64" \
            "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-arm64"

          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-amd64" \
            "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-amd64"

          docker buildx imagetools create \
            --tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-arm64" \
            "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-arm64"

      # --- GHCR midnightntwrk digests ---
      - name: Get GHCR midnightntwrk node release image digest
        if: inputs.skip-node != true
        id: midnightntwrk-digests-node
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Get GHCR midnightntwrk toolkit release image digest
        if: inputs.skip-toolkit != true
        id: midnightntwrk-digests-toolkit
        run: |
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      # --- GHCR midnightntwrk attestations ---
      - name: Attest node release image (GHCR midnightntwrk)
        if: inputs.skip-node != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.midnightntwrk-digests-node.outputs.digest }}

      - name: Attest toolkit release image (GHCR midnightntwrk)
        if: inputs.skip-toolkit != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.midnightntwrk-digests-toolkit.outputs.digest }}

      # --- Docker Hub: Node ---
      - name: Retag and push node release images (Docker Hub)
        if: inputs.skip-node != true
        run: |
          echo "Creating node images for Docker Hub from $IMAGE_TAG_CONTENT_HASH"
          docker pull "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-amd64"
          docker pull "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-arm64"

          echo "Tagging node images with $IMAGE_TAG_RELEASE"
          docker tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-amd64" "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-amd64"
          docker tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG_CONTENT_HASH}-arm64" "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-arm64"

          echo "Push node ${IMAGE_TAG_RELEASE} images to Docker Hub"
          docker push "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-amd64"
          docker push "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-arm64"

          echo "Create node multi-arch manifest for Docker Hub"
          docker manifest create "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}" \
            "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-amd64" \
            "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}-arm64"

          echo "Push node manifest to Docker Hub"
          docker manifest push "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}"

      # --- Docker Hub: Toolkit ---
      - name: Retag and push toolkit release images (Docker Hub)
        if: inputs.skip-toolkit != true
        run: |
          echo "Creating toolkit images for Docker Hub from $IMAGE_TAG_CONTENT_HASH"
          docker pull "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-amd64"
          docker pull "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-arm64"

          echo "Tagging toolkit images with $TOOLKIT_TAG_RELEASE"
          docker tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-amd64" "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-amd64"
          docker tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG_CONTENT_HASH}-arm64" "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-arm64"

          echo "Push toolkit ${TOOLKIT_TAG_RELEASE} images to Docker Hub"
          docker push "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-amd64"
          docker push "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-arm64"

          echo "Create toolkit multi-arch manifest for Docker Hub"
          docker manifest create "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}" \
            "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-amd64" \
            "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}-arm64"

          echo "Push toolkit manifest to Docker Hub"
          docker manifest push "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}"

      # --- Docker Hub digests ---
      - name: Get Docker Hub node release image digest
        if: inputs.skip-node != true
        id: dockerhub-digests-node
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "midnightntwrk/midnight-node:${IMAGE_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Get Docker Hub toolkit release image digest
        if: inputs.skip-toolkit != true
        id: dockerhub-digests-toolkit
        run: |
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "midnightntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      # --- Docker Hub attestations ---
      - name: Attest node release image (Docker Hub)
        if: inputs.skip-node != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.dockerhub-digests-node.outputs.digest }}

      - name: Attest toolkit release image (Docker Hub)
        if: inputs.skip-toolkit != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.dockerhub-digests-toolkit.outputs.digest }}

  # SBOM scan jobs run here (defined below) - they depend on prepare-release
  # and gate finalize-release

  finalize-release:
    permissions:
      contents: write
      pull-requests: write
    name: Create release
    runs-on: ubuntu-latest
    needs: [validate-inputs, prepare-release, sbom-scan-ghcr-node, sbom-scan-ghcr-toolkit, sbom-scan-dockerhub-node, sbom-scan-dockerhub-toolkit, sbom-scan-midnightntwrk-node, sbom-scan-midnightntwrk-toolkit]
    # Allow running when SBOM jobs are skipped (due to skip-node/skip-toolkit) but not when they fail
    if: ${{ !cancelled() && !failure() }}
    env:
      FORCE_COLOR: 1
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true
          ref: ${{ inputs.ref }}
          path: ./.tmp-package

      # We can remove this once merged to main - useful for now for testing against main branch
      # ./.github/actions/install-season
      - name: Checkout node repo (for install-season action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          path: ./midnight-node-ci

      - name: Install Season
        uses: ./midnight-node-ci/.github/actions/install-season
        with:
          gh-token: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
          config: ./midnight-node-ci/.github/season.yml

      - name: Setup Env
        shell: bash
        env:
          IMAGE_TAG_RELEASE: ${{ needs.prepare-release.outputs.image-tag-release }}
          IMAGE_TAG_CONTENT_HASH: ${{ needs.prepare-release.outputs.image-tag-content-hash }}
          GIT_TAG_RELEASE: ${{ needs.prepare-release.outputs.git-tag-release }}
          NODE_VERSION: ${{ needs.prepare-release.outputs.node-version }}
          TOOLKIT_VERSION: ${{ needs.prepare-release.outputs.toolkit-version }}
          RUNTIME_VERSION: ${{ needs.prepare-release.outputs.runtime-version }}
          TOOLKIT_TAG_RELEASE: ${{ needs.prepare-release.outputs.toolkit-tag-release }}
          RUNTIME_TAG_RELEASE: ${{ needs.prepare-release.outputs.runtime-tag-release }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release-sha }}
        run: |
          echo "IMAGE_TAG_CONTENT_HASH=$IMAGE_TAG_CONTENT_HASH" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_RELEASE=$IMAGE_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "GIT_TAG_RELEASE=$GIT_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "NODE_VERSION=$NODE_VERSION" >> "$GITHUB_ENV"
          echo "TOOLKIT_VERSION=$TOOLKIT_VERSION" >> "$GITHUB_ENV"
          echo "RUNTIME_VERSION=$RUNTIME_VERSION" >> "$GITHUB_ENV"
          echo "TOOLKIT_TAG_RELEASE=$TOOLKIT_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "RUNTIME_TAG_RELEASE=$RUNTIME_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"

      - name: Build Release Notes
        shell: bash
        env:
          SKIP_NODE: ${{ inputs.skip-node }}
          SKIP_TOOLKIT: ${{ inputs.skip-toolkit }}
          SKIP_RUNTIME: ${{ inputs.skip-runtime }}
        run: |
          if [ "$SKIP_NODE" != "true" ]; then
            export SEASON_VAR_NODE_DOCKER_IMAGE="midnightntwrk/midnight-node:$IMAGE_TAG_RELEASE"
            export SEASON_VAR_NODE_VERSION="$NODE_VERSION"
            export SEASON_VAR_NODE_TAG="$IMAGE_TAG_RELEASE"
          fi
          if [ "$SKIP_TOOLKIT" != "true" ]; then
            export SEASON_VAR_TOOLKIT_DOCKER_IMAGE="midnightntwrk/midnight-node-toolkit:$TOOLKIT_TAG_RELEASE"
            export SEASON_VAR_TOOLKIT_VERSION="$TOOLKIT_VERSION"
            export SEASON_VAR_TOOLKIT_TAG="$TOOLKIT_TAG_RELEASE"
          fi
          if [ "$SKIP_RUNTIME" != "true" ]; then
            export SEASON_VAR_RUNTIME_VERSION="$RUNTIME_VERSION"
            export SEASON_VAR_RUNTIME_TAG="$RUNTIME_TAG_RELEASE"
          fi
          export SEASON_VAR_RELEASE_TAG="$GIT_TAG_RELEASE"

          # Remove skipped component dirs so season doesn't render empty sections
          if [ "$SKIP_NODE" = "true" ]; then rm -rf "./.tmp-package/changes/node"; fi
          if [ "$SKIP_TOOLKIT" = "true" ]; then rm -rf "./.tmp-package/changes/toolkit"; fi
          if [ "$SKIP_RUNTIME" = "true" ]; then rm -rf "./.tmp-package/changes/runtime"; fi

          season build --changes-dir "./.tmp-package/changes" -o RELEASE_NOTES.md

          # Prepend icons to component section headings
          sed -i 's/^## Node$/## 📦 Node/' RELEASE_NOTES.md
          sed -i 's/^## Toolkit$/## 🧰 Toolkit/' RELEASE_NOTES.md
          sed -i 's/^## Runtime$/## ⚙️ Runtime/' RELEASE_NOTES.md

      - name: Create release
        shell: bash
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}
          FORCE: ${{ github.event.inputs.force }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If the tag already exists on the remote, refuse to publish unless it
          # points at the commit we built from. Without this guard, a pre-existing
          # tag at the wrong commit (e.g. created by a previous buggy run) would
          # be silently reused by `gh release create/edit`.
          # `git/ref/tags/<n>` is the exact-match endpoint; `git/refs/...` is a prefix match and returns an array.
          if EXISTING_TAG_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GIT_TAG_RELEASE}" 2>/dev/null); then
            EXISTING_SHA=$(echo "$EXISTING_TAG_JSON" | jq -r '.object.sha')
            EXISTING_TYPE=$(echo "$EXISTING_TAG_JSON" | jq -r '.object.type')
            if [ "$EXISTING_TYPE" = "tag" ]; then
              EXISTING_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${EXISTING_SHA}" --jq '.object.sha')
            fi
            if [ "$EXISTING_SHA" != "$RELEASE_SHA" ]; then
              echo "::error::Tag ${GIT_TAG_RELEASE} already exists at ${EXISTING_SHA} but the release was built from ${RELEASE_SHA}."
              echo "::error::Refusing to publish a release whose tag does not match the built tree."
              exit 1
            fi
          fi

          if gh release view --repo "$GITHUB_REPOSITORY" "$GIT_TAG_RELEASE" --json isDraft 2>/dev/null; then
            if gh release view --repo "$GITHUB_REPOSITORY" "$GIT_TAG_RELEASE" --json isDraft -q '.isDraft' | grep -q false; then
              if [ "$FORCE" != "true" ]; then
                echo "Release has already been published, skipping (use force to override)..."
                exit 0
              fi
            fi
            echo "Release already exists, modifying..."
            EDIT_OR_CREATE="edit"
          else
            echo "Creating release..."
            EDIT_OR_CREATE="create"
          fi

          FLAGS=()
          case "$RELEASE_TYPE" in
            draft)      FLAGS=("--draft") ;;
            prerelease) FLAGS=("--prerelease" "--draft=false") ;;
            latest)     FLAGS=("--latest" "--draft=false") ;;
          esac

          # `--target` is only valid (and only meaningful) when gh creates the
          # tag. Without it, gh creates the tag on the repository's default
          # branch (main) — which is exactly the bug we're fixing.
          if [ "$EDIT_OR_CREATE" = "create" ]; then
            FLAGS+=("--target" "$RELEASE_SHA")
          fi

          gh release --repo "$GITHUB_REPOSITORY" "$EDIT_OR_CREATE" "$GIT_TAG_RELEASE" \
            --title "$GIT_TAG_RELEASE" \
            "${FLAGS[@]}" \
            --notes-file RELEASE_NOTES.md

      - name: Create individual component tags
        shell: bash
        env:
          SKIP_NODE: ${{ inputs.skip-node }}
          SKIP_TOOLKIT: ${{ inputs.skip-toolkit }}
          SKIP_RUNTIME: ${{ inputs.skip-runtime }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create separate tags for toolkit and runtime (node tag is the primary release tag)
          # This ensures each component has its own tag for independent versioning.
          # RELEASE_SHA is the resolved SHA of inputs.ref (set by Setup Env), not
          # $GITHUB_SHA — which would be the workflow ref, possibly main.

          # Toolkit tag (only if toolkit is included and not skipped)
          if [ "$SKIP_TOOLKIT" != "true" ]; then
            echo "Creating tag toolkit-${TOOLKIT_TAG_RELEASE}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/toolkit-${TOOLKIT_TAG_RELEASE}" -f sha="$RELEASE_SHA" \
              || echo "Tag toolkit-${TOOLKIT_TAG_RELEASE} already exists, skipping"
          fi

          # Runtime tag (only if runtime is included and not skipped)
          if [ "$SKIP_RUNTIME" != "true" ]; then
            echo "Creating tag runtime-${RUNTIME_TAG_RELEASE}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/runtime-${RUNTIME_TAG_RELEASE}" -f sha="$RELEASE_SHA" \
              || echo "Tag runtime-${RUNTIME_TAG_RELEASE} already exists, skipping"
          fi

  archive-changes:
    needs: [validate-inputs, prepare-release, finalize-release]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/archive-changes.yml
    with:
      ref: ${{ inputs.ref }}
      release-tag: ${{ needs.prepare-release.outputs.git-tag-release }}
      archive-changes: ${{ inputs.archive-changes }}
      archive-mode: ${{ inputs.archive-mode }}
      reset-changes: ${{ inputs.reset-changes }}
      bump-version: ${{ inputs.bump-version }}
      skip-node: ${{ inputs.skip-node }}
      skip-toolkit: ${{ inputs.skip-toolkit }}
      skip-runtime: ${{ inputs.skip-runtime }}
    secrets: inherit

  create-release-assets:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    needs: [validate-inputs, finalize-release, prepare-release]
    if: >-
      !cancelled() && !failure() &&
      github.event.inputs.release-type != 'Don''t create a release.' &&
      (github.event.inputs.skip-node != 'true' || github.event.inputs.skip-toolkit != 'true')
    strategy:
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Setup Env
        shell: bash
        env:
          IMAGE_TAG_RELEASE: ${{ needs.prepare-release.outputs.image-tag-release }}
          TOOLKIT_TAG_RELEASE: ${{ needs.prepare-release.outputs.toolkit-tag-release }}
          GIT_TAG_RELEASE: ${{ needs.prepare-release.outputs.git-tag-release }}
        run: |
          echo "IMAGE_TAG_RELEASE=$IMAGE_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "TOOLKIT_TAG_RELEASE=$TOOLKIT_TAG_RELEASE" >> "$GITHUB_ENV"
          echo "GIT_TAG_RELEASE=$GIT_TAG_RELEASE" >> "$GITHUB_ENV"

      - name: Extract node binary from Docker image
        if: inputs.skip-node != true
        id: extract-node
        run: |
          PLATFORM="${{ matrix.platform }}"
          NODE_IMAGE="ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG_RELEASE}"
          NODE_RELEASE="midnight-node-${IMAGE_TAG_RELEASE}-linux-${PLATFORM}.tar.gz"

          echo "Extracting from: $NODE_IMAGE"
          docker pull --platform "linux/${PLATFORM}" "$NODE_IMAGE"
          CONTAINER_ID=$(docker create --platform "linux/${PLATFORM}" "$NODE_IMAGE")
          docker cp "$CONTAINER_ID:/midnight-node" ./
          docker cp "$CONTAINER_ID:/res" ./
          docker rm "$CONTAINER_ID"
          tar -czf "$NODE_RELEASE" midnight-node res
          rm -rf midnight-node res
          echo "Created: $NODE_RELEASE"
          echo "node_release=$NODE_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Extract toolkit binary from Docker image
        if: inputs.skip-toolkit != true
        id: extract-toolkit
        run: |
          PLATFORM="${{ matrix.platform }}"
          TOOLKIT_IMAGE="ghcr.io/midnight-ntwrk/midnight-node-toolkit:${TOOLKIT_TAG_RELEASE}"
          TOOLKIT_RELEASE="midnight-node-toolkit-${TOOLKIT_TAG_RELEASE}-linux-${PLATFORM}.tar.gz"

          echo "Extracting from: $TOOLKIT_IMAGE"
          docker pull --platform "linux/${PLATFORM}" "$TOOLKIT_IMAGE"
          CONTAINER_ID=$(docker create --platform "linux/${PLATFORM}" "$TOOLKIT_IMAGE")
          docker cp "$CONTAINER_ID:/midnight-node-toolkit" ./
          docker rm "$CONTAINER_ID"
          tar -czf "$TOOLKIT_RELEASE" midnight-node-toolkit
          rm -rf midnight-node-toolkit
          echo "Created: $TOOLKIT_RELEASE"
          echo "toolkit_release=$TOOLKIT_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        env:
          NODE_RELEASE: ${{ steps.extract-node.outputs.node_release }}
          TOOLKIT_RELEASE: ${{ steps.extract-toolkit.outputs.toolkit_release }}
        run: |
          if [ -n "$NODE_RELEASE" ]; then sha256sum "$NODE_RELEASE" >> "SHA256SUMS-${{ matrix.platform }}"; fi
          if [ -n "$TOOLKIT_RELEASE" ]; then sha256sum "$TOOLKIT_RELEASE" >> "SHA256SUMS-${{ matrix.platform }}"; fi
          echo "Generated checksums:"
          cat "SHA256SUMS-${{ matrix.platform }}"

      - name: Attest node release binary
        if: inputs.skip-node != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: ${{ steps.extract-node.outputs.node_release }}

      - name: Attest toolkit release binary
        if: inputs.skip-toolkit != true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: ${{ steps.extract-toolkit.outputs.toolkit_release }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_FILE: ${{ steps.extract-node.outputs.node_release }}
          TOOLKIT_FILE: ${{ steps.extract-toolkit.outputs.toolkit_release }}
        run: |
          echo "Uploading assets to release: $GIT_TAG_RELEASE"
          FILES=()
          [ -n "$NODE_FILE" ] && FILES+=("$NODE_FILE")
          [ -n "$TOOLKIT_FILE" ] && FILES+=("$TOOLKIT_FILE")
          FILES+=("SHA256SUMS-${{ matrix.platform }}")
          gh release upload --repo "$GITHUB_REPOSITORY" "$GIT_TAG_RELEASE" "${FILES[@]}"

  srtool-build:
    permissions:
      contents: write
      id-token: write
      attestations: write
    name: srtool Build
    needs: [validate-inputs, prepare-release, finalize-release]
    if: >-
      !cancelled() && !failure() &&
      github.event.inputs.release-type != 'Don''t create a release.' &&
      github.event.inputs.skip-runtime != 'true'
    uses: ./.github/workflows/srtool-build.yml
    with:
      ref: ${{ inputs.ref }}
      release-tag: ${{ needs.prepare-release.outputs.git-tag-release }}
      runtime-tag-release: ${{ needs.prepare-release.outputs.runtime-tag-release }}
    secrets: inherit

  finalize-checksums:
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs: [validate-inputs, prepare-release, create-release-assets, srtool-build]
    runs-on: ubuntu-latest
    if: >-
      !cancelled() && !failure() &&
      github.event.inputs.release-type != 'Don''t create a release.' &&
      (github.event.inputs.skip-node != 'true' || github.event.inputs.skip-toolkit != 'true')
    steps:
      - name: Setup Env
        shell: bash
        env:
          GIT_TAG_RELEASE: ${{ needs.prepare-release.outputs.git-tag-release }}
        run: |
          echo "GIT_TAG_RELEASE=$GIT_TAG_RELEASE" >> "$GITHUB_ENV"

      - name: Download and combine checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading checksum files from release: $GIT_TAG_RELEASE"
          gh release download "$GIT_TAG_RELEASE" --repo "$GITHUB_REPOSITORY" \
            --pattern "SHA256SUMS-*"

          # Combine into single file
          echo "Combining checksums:"
          cat SHA256SUMS-* | sort > SHA256SUMS
          cat SHA256SUMS

          # Remove individual platform files from release
          echo "Removing per-platform checksum files from release..."
          for f in SHA256SUMS-*; do
            gh release delete-asset "$GIT_TAG_RELEASE" --repo "$GITHUB_REPOSITORY" "$f" --yes
          done

      - name: Attest checksums file
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: SHA256SUMS

      - name: Upload final checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading checksums to release: $GIT_TAG_RELEASE"
          gh release upload --repo "$GITHUB_REPOSITORY" "$GIT_TAG_RELEASE" \
            SHA256SUMS

  sbom-scan-ghcr-node:
    if: github.event.inputs.skip-node != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM/Scan Node GHCR (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.prepare-release.outputs.image-tag-content-hash }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-ghcr-${{ matrix.arch }}-release
      tlog-upload: true
    secrets: inherit

  sbom-scan-ghcr-toolkit:
    if: github.event.inputs.skip-toolkit != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM/Scan Toolkit GHCR (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.image-tag-content-hash }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-ghcr-${{ matrix.arch }}-release
      tlog-upload: true
    secrets: inherit

  sbom-scan-dockerhub-node:
    if: github.event.inputs.skip-node != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM Attest Node Docker Hub (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release, sbom-scan-ghcr-node]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.image-tag-release }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-dockerhub-${{ matrix.arch }}-release
      skip-scan: true
      tlog-upload: true
    secrets: inherit

  sbom-scan-dockerhub-toolkit:
    if: github.event.inputs.skip-toolkit != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM Attest Toolkit Docker Hub (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release, sbom-scan-ghcr-toolkit]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.toolkit-tag-release }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-dockerhub-${{ matrix.arch }}-release
      skip-scan: true
      tlog-upload: true
    secrets: inherit

  sbom-scan-midnightntwrk-node:
    if: github.event.inputs.skip-node != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM Attest Node midnightntwrk (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release, sbom-scan-ghcr-node]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.image-tag-release }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-midnightntwrk-${{ matrix.arch }}-release
      platform: linux/${{ matrix.arch }}
      multi-arch-image: ghcr.io/midnightntwrk/midnight-node:${{ needs.prepare-release.outputs.image-tag-release }}
      skip-scan: true
      tlog-upload: true
    secrets: inherit

  sbom-scan-midnightntwrk-toolkit:
    if: github.event.inputs.skip-toolkit != 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    name: SBOM Attest Toolkit midnightntwrk (${{ matrix.arch }})
    needs: [validate-inputs, prepare-release, sbom-scan-ghcr-toolkit]
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.toolkit-tag-release }}-${{ matrix.arch }}
      sbom-artifact-name: sbom-midnight-node-toolkit-midnightntwrk-${{ matrix.arch }}-release
      platform: linux/${{ matrix.arch }}
      multi-arch-image: ghcr.io/midnightntwrk/midnight-node-toolkit:${{ needs.prepare-release.outputs.toolkit-tag-release }}
