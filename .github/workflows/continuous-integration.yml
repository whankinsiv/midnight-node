name: CI + E2E

env:
  # Define environment variables for AWS credentials and region
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_EKS_CLUSTER_NAME: ${{ secrets.AWS_EKS_CLUSTER_NAME }}

on:
  merge_group:
  pull_request:
    branches: [ "**" ]
    paths-ignore:
      - "changes/**"
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
  packages: write
  attestations: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true
jobs:
  run:
    name: Build node and images (linux/amd64, ubuntu-latest-16-core-x64, amd64)
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-16-core-x64
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
      node_image_tag: ${{ steps.image_tags.outputs.node_image_tag }}
      toolkit_image_tag: ${{ steps.image_tags.outputs.toolkit_image_tag }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run build
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly -P --ci --push +images

      - name: Export image tags
        id: image_tags
        run: |
          short_hash=$(git rev-parse --short=8 HEAD)
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "node_image_tag=${version}-dev-${short_hash}-amd64" >> "$GITHUB_OUTPUT"
          echo "toolkit_image_tag=${version}-${short_hash}-amd64" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: success() || failure()
        with:
          name: Wasm Runtime and binaries (amd64)
          path: artifacts-amd64/

      - name: Upload test artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: success() || failure()
        with:
          name: Test artifacts (amd64)
          path: test-artifacts-amd64/

  sbom-scan-node:
    name: SBOM/Scan Node
    needs: [run]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.run.outputs.node_image_tag }}
      sbom-artifact-name: sbom-midnight-node-ci
      skip-attestation: ${{ github.event.pull_request.head.repo.fork || false }}
    secrets: inherit

  sbom-scan-toolkit:
    name: SBOM/Scan Toolkit
    needs: [run]
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.run.outputs.toolkit_image_tag }}
      sbom-artifact-name: sbom-midnight-node-toolkit-ci
      skip-attestation: ${{ github.event.pull_request.head.repo.fork || false }}
    secrets: inherit

  run-arm64:
    name: Build node and images (arm64)
    # ARM64 gating: only for merge_group, workflow_dispatch, or PRs with ci:arm64 label
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:arm64'))
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-8-core-arm64
    env:
      FORCE_COLOR: 1
    steps:
      # QEMU required on ARM64 runner for compactc (amd64-only binary)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:1b804311fe87047a4c96d38b4b3ef6f62fca8cd125265917a9e3dc3c996c39e6 # latest
          platforms: "amd64"

      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run build
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly -P --ci --push +images

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: success() || failure()
        with:
          name: Wasm Runtime and binaries (arm64)
          path: artifacts-arm64/

      - name: Upload test artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: success() || failure()
        with:
          name: Test artifacts (arm64)
          path: test-artifacts-arm64/

  hardfork:
    name: Build hardfork images
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run build
        run: |
          mkdir -p "$HOME/.cargo"
          echo "[net]" >> "$HOME/.cargo/config"
          echo "git-fetch-with-cli = true" >> "$HOME/.cargo/config"

          . ./.envrc && earthly --push +hardfork-test-upgrader-image

  check-unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Check Deps
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly +check-deps

  rebuild-genesis:
    name: Check Genesis Rebuild
    needs: [ run ]
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Generate dummy genesis seeds
        run: |
          mkdir -p secrets
          for cfg in res/cfg/*.toml; do
            network=$(basename "$cfg" .toml)
            python3 scripts/generate-genesis-seeds.py -c 4 -o "secrets/${network}-genesis-seeds.json"
          done

      - name: Check Genesis Rebuild
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly \
            --build-arg "NODE_IMAGE=ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64" \
            --build-arg "TOOLKIT_IMAGE=ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64" \
            +rebuild-genesis

  hardfork-e2e:
    name: Hardfork E2E
    needs:
      - run
      - hardfork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: hardfork-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          upgrader-image: ghcr.io/midnight-ntwrk/midnight-hardfork-test-upgrader:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  ledger-rollback-e2e:
    name: Ledger Rollback E2E
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      # TODO UNSHIELDED: Hard-fork capability broken after latest `ledger-5.0.0` release
      # - uses: ./.github/actions/reusable-e2e-tests
      #   with:
      #     just-command: ledger-rollback-e2e
      #     node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
      #     upgrader-image: ghcr.io/midnight-ntwrk/midnight-hardfork-test-upgrader:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-
      #     ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
      - name: 💤 Dummy step to bypass real test
        run: echo "Skipping test — dummy command"

  # Test pallet-midnight fixture tests - these do NOT require toolkit-js
  test-pallet-fixtures:
    name: Test Pallet Fixtures
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run pallet fixture tests
        run: |
          . ./.envrc && earthly --strict +test-pallet-fixtures

  # Gate job for toolkit E2E tests - if this fails, toolkit E2E tests are skipped
  test-toolkit:
    name: Test Toolkit
    needs: [run]
    runs-on: ubuntu-latest-16-core-x64
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run toolkit tests
        run: |
          . ./.envrc && earthly -P --strict \
            --build-arg "NODE_IMAGE=ghcr.io/midnight-ntwrk/midnight-node:${{ needs.run.outputs.node_image_tag }}" \
            +test-toolkit

  toolkit-e2e:
    name: Toolkit E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-update-ledger-parameters-e2e:
    name: Toolkit Update Ledger Parameters E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-update-ledger-parameters-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-maintenance-e2e:
    name: Toolkit Maintenance E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-maintenance-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-mint-e2e:
    name: Toolkit Mint E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-mint-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-tokens-minter-e2e:
    name: Toolkit Unshielded Token E2E
    needs: [ run ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-tokens-minter-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  metadata-check:
    name: Metadata Check
    needs: run
    runs-on: ubuntu-latest
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run metadata check
        run: |
          . ./.envrc && earthly --ci -P \
            --build-arg "NODE_IMAGE=ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64" \
            +check-metadata

  toolkit-contracts-e2e:
    name: Toolkit Contracts E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-contracts-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  startup-dev-e2e:
    name: Startup E2E in dev mode
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: startup-dev-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  genesis-undeployed-e2e:
    name: Genesis Wallets E2E for Undeployed network
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Get Version and git commit
        id: meta
        run: |
          echo "short_hash=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: genesis-wallets-undeployed-e2e
          node-image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_hash }}-amd64
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_hash }}-amd64
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  build-indexer-images:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == false) || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      packages: read
      contents: write
    outputs:
      indexer_api_image: ${{ steps.image_meta.outputs.indexer_api_image }}
      chain_indexer_image: ${{ steps.image_meta.outputs.chain_indexer_image }}
      wallet_indexer_image: ${{ steps.image_meta.outputs.wallet_indexer_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Install just
        uses: taiki-e/install-action@cfdb446e391c69574ebc316dfb7d7849ec12b940 #v2.68.8
        with:
          tool: just

      - name: Build indexer images
        run: |
          mkdir -p "$HOME/.cargo"
          echo "[net]" >> "$HOME/.cargo/config"
          echo "git-fetch-with-cli = true" >> "$HOME/.cargo/config"

          # Force AMD64 architecture for all builds
          export DOCKER_DEFAULT_PLATFORM=linux/amd64
          export DOCKER_BUILDKIT=1
          export BUILDX_PLATFORM=linux/amd64

          # Login to Docker once at the start
          echo "🔐 Logging into Docker..."
          echo "${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}" | docker login ghcr.io -u MidnightCI --password-stdin

          pwd
          ls
          cd indexer || exit 1
          ls
          . .envrc

          # Check available docker builders and platforms
          echo "Available docker builders:"
          docker buildx ls
          echo "Current platform: $(uname -m)"
          echo "DOCKER_DEFAULT_PLATFORM: $DOCKER_DEFAULT_PLATFORM"

          # Build with explicit AMD64 platform
          echo "🔧 Building indexer-api with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image indexer-api

          echo "🔧 Building chain-indexer with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image chain-indexer

          echo "🔧 Building wallet-indexer with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image wallet-indexer

          # Retag images with main repo's commit hash (not submodule's)
          echo "🏷️ Retagging images with main repo commit hash..."

          # Get commit hashes
          MAIN_COMMIT=$(git -C .. rev-parse --short=8 HEAD)
          echo "Main repo commit: $MAIN_COMMIT"

          SUBMODULE_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Submodule commit: $SUBMODULE_COMMIT"

          # Retag all indexer images
          echo "🏷️ Retagging images..."
          docker tag "ghcr.io/midnight-ntwrk/indexer-api:${SUBMODULE_COMMIT}" "ghcr.io/midnight-ntwrk/indexer-api:${MAIN_COMMIT}"
          docker tag "ghcr.io/midnight-ntwrk/chain-indexer:${SUBMODULE_COMMIT}" "ghcr.io/midnight-ntwrk/chain-indexer:${MAIN_COMMIT}"
          docker tag "ghcr.io/midnight-ntwrk/wallet-indexer:${SUBMODULE_COMMIT}" "ghcr.io/midnight-ntwrk/wallet-indexer:${MAIN_COMMIT}"

          # Push the new tags
          echo "📤 Pushing retagged images..."
          docker push "ghcr.io/midnight-ntwrk/indexer-api:${MAIN_COMMIT}"
          docker push "ghcr.io/midnight-ntwrk/chain-indexer:${MAIN_COMMIT}"
          docker push "ghcr.io/midnight-ntwrk/wallet-indexer:${MAIN_COMMIT}"

          echo "✅ Images retagged and pushed successfully!"

      - name: Expose image refs as outputs
        id: image_meta
        run: |
          # Use main repo's commit hash (not submodule's)
          short_hash=$(git rev-parse --short=8 HEAD)
          {
            echo "indexer_api_image=ghcr.io/midnight-ntwrk/indexer-api:${short_hash}"
            echo "chain_indexer_image=ghcr.io/midnight-ntwrk/chain-indexer:${short_hash}"
            echo "wallet_indexer_image=ghcr.io/midnight-ntwrk/wallet-indexer:${short_hash}"
          } >> "$GITHUB_OUTPUT"

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 #v2.8.2

      - name: Configure git for private repos
        run: |
          git config --global url."https://${GH_PAT}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        env:
          GH_PAT: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Install cargo-nextest
        run: |
          cargo install cargo-nextest@0.9.128 --locked

      - name: just test
        env:
          APP__INFRA__SECRET: ${{ secrets.APP__INFRA__SECRET }}
        run: |
          . ./.envrc
          git config --global url."https://@github.com".insteadOf "ssh://git@github.com"
          cd indexer || exit 1
          just feature=standalone test

  local-environment-tests:
    name: Local Environment Tests
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == false) || github.event_name == 'merge_group'
    needs: [ run, build-indexer-images ]
    runs-on: ubuntu-latest-8-core-x64
    permissions:
      pull-requests: write
      packages: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true

      - name: Get Version and git commit
        id: meta
        run: |
          set -euo pipefail

          # Main repo short hash
          short_hash=$(git rev-parse --short=8 HEAD)
          echo "short_hash=$short_hash" >> "$GITHUB_OUTPUT"

          # App version from node/Cargo.toml
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Indexer short hash (if indexer is its own git repo/submodule)
          pushd indexer >/dev/null
          indexer_tag=$(git rev-parse --short=8 HEAD)
          popd >/dev/null
          echo "indexer_tag=$indexer_tag" >> "$GITHUB_OUTPUT"

          # Tag for node and toolkit images
          node_tag="${version}-${short_hash}-amd64"
          echo "node_tag=$node_tag" >> "$GITHUB_OUTPUT"

          echo "Get Version and git commit"
          echo "short_hash: $short_hash"
          echo "version: $version"
          echo "indexer_tag: $indexer_tag"
          echo "node_tag: $node_tag"

      - name: Deploy and test against local environment
        uses: ./.github/actions/local-environment-tests
        with:
          tag: CI
          image: ghcr.io/midnight-ntwrk/midnight-node:${{ steps.meta.outputs.node_tag }}
          toolkit-image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ steps.meta.outputs.node_tag }}
          indexer-api-image: ${{ needs.build-indexer-images.outputs.indexer_api_image }}
          chain-indexer-image: ${{ needs.build-indexer-images.outputs.chain_indexer_image }}
          wallet-indexer-image: ${{ needs.build-indexer-images.outputs.wallet_indexer_image }}
          indexer-tag: ${{ steps.meta.outputs.indexer_tag }}
          sha: ${{ steps.meta.outputs.short_hash }}
          tests: premerge
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

