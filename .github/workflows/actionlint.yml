name: Validate GitHub Actions Workflows

on:
  merge_group:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

# no top level default permissions for security reasons
permissions: {}

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    # no top level default permissions for security reasons
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: guard
        uses: ./.github/actions/tree-cache-guard

      - name: Run actionlint
        if: steps.guard.outputs.hit != 'true'
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          matcher: true # Enable GitHub annotations for errors
          fail-on-error: true # Fail CI when errors are found

      - uses: ./.github/actions/tree-cache-guard/save
        if: steps.guard.outputs.hit != 'true'
        with:
          key: ${{ steps.guard.outputs.key }}
