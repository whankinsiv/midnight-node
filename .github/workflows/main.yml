  publish-multi-arch:
    name: Publish multi-arch image
    runs-on: ubuntu-latest
    needs: [publish-amd64, publish-arm64, build-indexer-images, sbom-scan-node-amd64, sbom-scan-node-arm64, sbom-scan-toolkit-amd64, sbom-scan-toolkit-arm64]
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for keyless signing with Cosign
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: true

      - name: Create and push Docker manifest (GHCR)
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          echo "Creating manifests for node/toolkit with tags: $IMAGE_TAG"

          # Multi-arch node image
          docker manifest create ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG} \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64

          # Toolkit manifests
          docker manifest create ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG} \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64

          # Push node manifests
          docker manifest push ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}
          docker manifest push ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}

      - name: Sign multi-arch manifests (GHCR)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}"
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}"

      - name: Mirror arch-specific images to midnightntwrk (GHCR)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          # Needed only for older branches where Earthly is not pushing to midnightntwrk
          for IMAGE in midnight-node midnight-node-toolkit; do
            for ARCH in amd64 arm64; do
              SRC="ghcr.io/midnight-ntwrk/${IMAGE}:${IMAGE_TAG}-${ARCH}"
              DST="ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-${ARCH}"
              if docker buildx imagetools inspect "$DST" > /dev/null 2>&1; then
                echo "${DST} already exists, skipping"
              else
                echo "Mirroring ${SRC} -> ${DST}"
                docker pull --platform "linux/${ARCH}" "$SRC"
                docker tag "$SRC" "$DST"
                docker push "$DST"
              fi
            done
          done

      - name: Create commit-tagged multi-arch images (GHCR midnightntwrk)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          for IMAGE in midnight-node midnight-node-toolkit; do
            # Arch-specific images already pushed by Earthly; create multi-arch manifest
            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"
          done

      - name: Sign commit-tagged images (GHCR midnightntwrk)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}"
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}"

      - name: Create and push `latest-main` images (GHCR)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          docker manifest create ghcr.io/midnight-ntwrk/midnight-node:latest-main \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64

          docker manifest create ghcr.io/midnight-ntwrk/midnight-node-toolkit:latest-main \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64

          docker manifest push ghcr.io/midnight-ntwrk/midnight-node:latest-main
          docker manifest push ghcr.io/midnight-ntwrk/midnight-node-toolkit:latest-main

      - name: Create `latest-main` images (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          for IMAGE in midnight-node midnight-node-toolkit; do
            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main-arm64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"
          done

      - name: Create and push `latest-main` images (Docker Hub)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          echo "Creating manifests for node/toolkit from $IMAGE_TAG images"
          docker pull ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-amd64
          docker pull ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-arm64
          docker pull ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64
          docker pull ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64

          echo "Tagging each image with 'latest-main'"
          docker tag ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-amd64 midnightntwrk/midnight-node:latest-main-amd64
          docker tag ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-arm64 midnightntwrk/midnight-node:latest-main-arm64
          docker tag ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64 midnightntwrk/midnight-node-toolkit:latest-main-amd64
          docker tag ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64 midnightntwrk/midnight-node-toolkit:latest-main-arm64

          echo "Push 'latest-main' images to Docker Hub"
          docker push midnightntwrk/midnight-node:latest-main-amd64
          docker push midnightntwrk/midnight-node:latest-main-arm64
          docker push midnightntwrk/midnight-node-toolkit:latest-main-amd64
          docker push midnightntwrk/midnight-node-toolkit:latest-main-arm64

          echo "Create multi-arch manifests for Docker Hub"
          docker manifest create midnightntwrk/midnight-node:latest-main \
            midnightntwrk/midnight-node:latest-main-amd64 \
            midnightntwrk/midnight-node:latest-main-arm64

          docker manifest create midnightntwrk/midnight-node-toolkit:latest-main \
            midnightntwrk/midnight-node-toolkit:latest-main-amd64 \
            midnightntwrk/midnight-node-toolkit:latest-main-arm64

          echo "Push manifests to Docker Hub"
          docker manifest push midnightntwrk/midnight-node:latest-main
          docker manifest push midnightntwrk/midnight-node-toolkit:latest-main

      - name: Sign Docker Hub images (latest-main)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh

          # Sign arch-specific images
          sign_with_retry "midnightntwrk/midnight-node:latest-main-amd64"
          sign_with_retry "midnightntwrk/midnight-node:latest-main-arm64"
          sign_with_retry "midnightntwrk/midnight-node-toolkit:latest-main-amd64"
          sign_with_retry "midnightntwrk/midnight-node-toolkit:latest-main-arm64"

          # Sign multi-arch manifests
          sign_with_retry "midnightntwrk/midnight-node:latest-main"
          sign_with_retry "midnightntwrk/midnight-node-toolkit:latest-main"

      - name: Sign `latest-main` images (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node:latest-main"
          sign_with_retry "ghcr.io/midnightntwrk/midnight-node-toolkit:latest-main"

      - name: Check if indexer is on main
        id: indexer-check
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          pushd indexer
          # Get the upstream branch name for the submodule commit
          git fetch --unshallow
          INDEXER_BRANCH=$(git branch -r --contains HEAD | grep "origin/main" || true)
          popd

          if [ -z "$INDEXER_BRANCH" ]; then
            echo "❌ Indexer submodule is not tracking origin/main."
            echo "   Refusing to publish indexer and node images for node-dev-01."
            echo "result=notok" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Indexer submodule is on main. Pushing NODE_DEV_01 images."
            echo "INDEXER_IMAGE_TAG=${INDEXER_IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "result=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Push NODE_DEV_01 images
        if: ${{ steps.indexer-check.outputs.result == 'ok' }}
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"
          export INDEXER_IMAGE_TAG="${{ needs.build-indexer-images.outputs.INDEXER_IMAGE_TAG }}"
          export NODE_DEV_01_TAG="${IMAGE_TAG}-node-dev-01"

          docker manifest create ghcr.io/midnight-ntwrk/midnight-node:${NODE_DEV_01_TAG} \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64

          docker manifest create ghcr.io/midnight-ntwrk/midnight-node-toolkit:${NODE_DEV_01_TAG} \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64 \
            ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64

          docker manifest push ghcr.io/midnight-ntwrk/midnight-node:${NODE_DEV_01_TAG}
          docker manifest push ghcr.io/midnight-ntwrk/midnight-node-toolkit:${NODE_DEV_01_TAG}

          # Pull, re-tag, and push indexer images

          docker pull ghcr.io/midnight-ntwrk/indexer-api:${INDEXER_IMAGE_TAG}
          docker pull ghcr.io/midnight-ntwrk/chain-indexer:${INDEXER_IMAGE_TAG}
          docker pull ghcr.io/midnight-ntwrk/wallet-indexer:${INDEXER_IMAGE_TAG}

          docker tag ghcr.io/midnight-ntwrk/indexer-api:${INDEXER_IMAGE_TAG} ghcr.io/midnight-ntwrk/indexer-api:${NODE_DEV_01_TAG}
          docker tag ghcr.io/midnight-ntwrk/chain-indexer:${INDEXER_IMAGE_TAG} ghcr.io/midnight-ntwrk/chain-indexer:${NODE_DEV_01_TAG}
          docker tag ghcr.io/midnight-ntwrk/wallet-indexer:${INDEXER_IMAGE_TAG} ghcr.io/midnight-ntwrk/wallet-indexer:${NODE_DEV_01_TAG}

          docker push ghcr.io/midnight-ntwrk/indexer-api:${NODE_DEV_01_TAG}
          docker push ghcr.io/midnight-ntwrk/chain-indexer:${NODE_DEV_01_TAG}
          docker push ghcr.io/midnight-ntwrk/wallet-indexer:${NODE_DEV_01_TAG}

  sbom-scan-midnightntwrk-node-amd64:
    name: SBOM/Scan Node midnightntwrk (amd64)
    needs: [publish-multi-arch, publish-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnightntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-amd64
      sbom-artifact-name: sbom-midnight-node-midnightntwrk-amd64
      platform: linux/amd64
      multi-arch-image: ghcr.io/midnightntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}
