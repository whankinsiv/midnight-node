name: Main - Toolkit and Node build/publish

on:
  push:
    branches: ["main", "release/*"]
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to build and deploy"
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild even if images already exist"
        required: false
        type: boolean
        default: false

# no top level default permissions for security reasons
permissions: {}

jobs:
  publish-amd64:
    name: AMD Build and Publish
    runs-on: [self-hosted, "tier:large"]
    outputs:
      IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
    env:
      FORCE_COLOR: 1
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write  # Required for GitHub native attestations
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          submodules: true
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      # We can remove this after merge of #1131
      # needed for testing while main branch does not have
      # ./.github/actions/install-season
      - name: Checkout node repo (for install-season action)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: ./midnight-node-ci

      - name: Install Season
        uses: ./midnight-node-ci/.github/actions/install-season
        with:
          gh-token: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
          config: ./midnight-node-ci/.github/season.yml

      - name: Install just
        uses: taiki-e/install-action@6ed6112eb9893c58dd600eebccdf6e77ab7bfa9c #v2.79.12
        with:
          tool: just

      - name: Check if images already exist
        id: check-images
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          CONTENT_HASH=$(git rev-parse "HEAD^{tree}" | cut -c1-12)
          VERSION=$(grep -m1 'version =' node/Cargo.toml | awk '{print $3}' | tr -d '"')
          IMAGE_TAG="${VERSION}-${CONTENT_HASH}"
          printf "IMAGE_TAG=%s\n" "${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          IMAGES_EXIST=false
          if [ "$FORCE_REBUILD" != "true" ]; then
            NODE_EXISTS=$(docker manifest inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64" > /dev/null 2>&1 && echo true || echo false)
            TOOLKIT_EXISTS=$(docker manifest inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64" > /dev/null 2>&1 && echo true || echo false)
            if [ "$NODE_EXISTS" = "true" ] && [ "$TOOLKIT_EXISTS" = "true" ]; then
              IMAGES_EXIST=true
            fi
          fi
          echo "Images exist: $IMAGES_EXIST"
          printf "images_exist=%s\n" "${IMAGES_EXIST}" >> "$GITHUB_OUTPUT"

      - name: Extract existing artifacts
        if: steps.check-images.outputs.images_exist == 'true'
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          echo "Images already exist for ${IMAGE_TAG}-amd64, skipping build"
          . ./.envrc && earthly +extract-node-artifacts \
            --NODE_IMAGE="ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64"
          . ./.envrc && earthly +extract-toolkit-artifacts \
            --TOOLKIT_IMAGE="ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64"

      - name: Free disk space
        if: steps.check-images.outputs.images_exist != 'true' && runner.environment != 'self-hosted'
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- "scripts/free-disk-space.sh"
          ./scripts/free-disk-space.sh

      - name: Run build
        if: steps.check-images.outputs.images_exist != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          # We don't use --ci as we want artifacts to be saved
          # AND we can't use --strict or --ci because we're using LOCALLY in both +node-image and +toolkit-image
          . ./.envrc && earthly -P --use-inline-cache --save-inline-cache --push +node-image
          . ./.envrc && earthly --secret GITHUB_TOKEN="$GITHUB_TOKEN" -P --push +toolkit-image

      - name: Get image digests
        id: digests
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest node image (amd64)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node
          subject-digest: ${{ steps.digests.outputs.node }}

      - name: Attest toolkit image (amd64)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.digests.outputs.toolkit }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  #v7.0.1
        if: success() || failure()
        with:
          name: midnight-node-amd64
          path: artifacts-amd64/

      - name: Create release archives
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          PLATFORM="amd64"

          # Create node archive (binary + res directory, matching release format)
          NODE_RELEASE="midnight-node-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"
          tar -czf "$NODE_RELEASE" -C artifacts-${PLATFORM} midnight-node res
          echo "Created: $NODE_RELEASE"
          ls -lh "$NODE_RELEASE"

          # Create toolkit archive
          TOOLKIT_RELEASE="midnight-node-toolkit-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"
          tar -czf "$TOOLKIT_RELEASE" -C artifacts-${PLATFORM} midnight-node-toolkit
          echo "Created: $TOOLKIT_RELEASE"
          ls -lh "$TOOLKIT_RELEASE"

          # Generate checksums
          {
            sha256sum "$NODE_RELEASE"
            sha256sum "$TOOLKIT_RELEASE"
          } > "SHA256SUMS-${PLATFORM}"
          echo "Generated checksums:"
          cat "SHA256SUMS-${PLATFORM}"

      - name: Build Release Notes
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          export SEASON_VAR_NODE_DOCKER_IMAGE="midnightntwrk/midnight-node:$IMAGE_TAG"
          export SEASON_VAR_TOOLKIT_DOCKER_IMAGE="midnightntwrk/midnight-node-toolkit:$IMAGE_TAG"
          export SEASON_VAR_RELEASE_TAG="N/A"
          season build --changes-dir changes -o RELEASE_NOTES.md

      - name: Create or Update Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          if [[ "$BRANCH" != "main" && ! "$BRANCH" =~ ^release/.* ]]; then
            echo "Branch \"$BRANCH\" is not \"main\" and does not start with \"release/\", skipping draft release creation for AMD64..."
            exit 0
          fi

          RELEASE_TITLE="[Unreleased]"

          if gh release view "$RELEASE_TITLE" --json isDraft | grep false; then
            echo "Release has already been published, skipping draft..."
            exit 0
          fi

          if gh release view "$RELEASE_TITLE"; then
            echo "Release already exists, modifying..."
            EDIT_OR_CREATE="edit"
          else
            echo "Creating release..."
            EDIT_OR_CREATE="create"
          fi

          gh release $EDIT_OR_CREATE "$RELEASE_TITLE" \
            --title "$RELEASE_TITLE" \
            --draft \
            --notes-file RELEASE_NOTES.md

          PLATFORM="amd64"

          # Remove stale assets for this platform (old IMAGE_TAG filenames linger)
          for asset in $(gh release view "$RELEASE_TITLE" --json assets -q ".assets[].name" | grep "${PLATFORM}"); do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$RELEASE_TITLE" "$asset" --yes || true
          done

          gh release upload "$RELEASE_TITLE" \
            "midnight-node-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz" \
            "midnight-node-toolkit-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz" \
            "SHA256SUMS-${PLATFORM}"

      - name: Archive release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  publish-arm64:
    name: ARM Build and Publish
    runs-on: ubuntu-latest-8-core-arm64
    env:
      FORCE_COLOR: 1
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write  # Required for GitHub native attestations
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          submodules: true
          ref: ${{ github.event.inputs.branch }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Check if images already exist
        id: check-images
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          CONTENT_HASH=$(git rev-parse "HEAD^{tree}" | cut -c1-12)
          VERSION=$(grep -m1 'version =' node/Cargo.toml | awk '{print $3}' | tr -d '"')
          IMAGE_TAG="${VERSION}-${CONTENT_HASH}"
          printf "IMAGE_TAG=%s\n" "${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          IMAGES_EXIST=false
          if [ "$FORCE_REBUILD" != "true" ]; then
            NODE_EXISTS=$(docker manifest inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64" > /dev/null 2>&1 && echo true || echo false)
            TOOLKIT_EXISTS=$(docker manifest inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64" > /dev/null 2>&1 && echo true || echo false)
            if [ "$NODE_EXISTS" = "true" ] && [ "$TOOLKIT_EXISTS" = "true" ]; then
              IMAGES_EXIST=true
            fi
          fi
          echo "Images exist: $IMAGES_EXIST"
          printf "images_exist=%s\n" "${IMAGES_EXIST}" >> "$GITHUB_OUTPUT"

      - name: Extract existing artifacts
        if: steps.check-images.outputs.images_exist == 'true'
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          echo "Images already exist for ${IMAGE_TAG}-arm64, skipping build"
          . ./.envrc && earthly +extract-node-artifacts \
            --NODE_IMAGE="ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64"
          . ./.envrc && earthly +extract-toolkit-artifacts \
            --TOOLKIT_IMAGE="ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64"

      - name: Run Node and toolkit builds
        if: steps.check-images.outputs.images_exist != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly -P --use-inline-cache --save-inline-cache --push +node-image
          . ./.envrc && earthly --secret GITHUB_TOKEN="$GITHUB_TOKEN" -P --push +toolkit-image

      - name: Get image digests
        id: digests
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest node image (arm64)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node
          subject-digest: ${{ steps.digests.outputs.node }}

      - name: Attest toolkit image (arm64)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.digests.outputs.toolkit }}



      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  #v7.0.1
        if: success() || failure()
        with:
          name: midnight-node-arm64
          path: artifacts-arm64/

      - name: Create release archives
        env:
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          PLATFORM="arm64"

          # Create node archive (binary + res directory, matching release format)
          NODE_RELEASE="midnight-node-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"
          tar -czf "$NODE_RELEASE" -C artifacts-${PLATFORM} midnight-node res
          echo "Created: $NODE_RELEASE"
          ls -lh "$NODE_RELEASE"

          # Create toolkit archive
          TOOLKIT_RELEASE="midnight-node-toolkit-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz"
          tar -czf "$TOOLKIT_RELEASE" -C artifacts-${PLATFORM} midnight-node-toolkit
          echo "Created: $TOOLKIT_RELEASE"
          ls -lh "$TOOLKIT_RELEASE"

          # Generate checksums
          {
            sha256sum "$NODE_RELEASE"
            sha256sum "$TOOLKIT_RELEASE"
          } > "SHA256SUMS-${PLATFORM}"
          echo "Generated checksums:"
          cat "SHA256SUMS-${PLATFORM}"

      - name: Create or Update Draft Release (ARM64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          IMAGE_TAG: ${{ steps.check-images.outputs.IMAGE_TAG }}
        run: |
          if [[ "$BRANCH" != "main" && ! "$BRANCH" =~ ^release/.* ]]; then
            echo "Branch \"$BRANCH\" is not \"main\" and does not start with \"release/\", skipping draft release creation for ARM64..."
            exit 0
          fi

          RELEASE_TITLE="[Unreleased]"

          if gh release view "$RELEASE_TITLE" --json isDraft | grep false; then
            echo "Release has already been published, skipping draft..."
            exit 0
          fi

          PLATFORM="arm64"

          # Remove stale assets for this platform (old IMAGE_TAG filenames linger)
          for asset in $(gh release view "$RELEASE_TITLE" --json assets -q ".assets[].name" | grep "${PLATFORM}"); do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$RELEASE_TITLE" "$asset" --yes || true
          done

          echo "Uploading ARM64 release archives..."
          gh release upload "$RELEASE_TITLE" \
            "midnight-node-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz" \
            "midnight-node-toolkit-${IMAGE_TAG}-linux-${PLATFORM}.tar.gz" \
            "SHA256SUMS-${PLATFORM}"
          echo "ARM64 release archives uploaded successfully."

  sbom-scan-node-amd64:
    name: SBOM/Scan Node (amd64)
    needs: [publish-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-amd64
      sbom-artifact-name: sbom-midnight-node-amd64
      skip-attestation: true
    secrets: inherit

  sbom-scan-node-arm64:
    name: SBOM/Scan Node (arm64)
    needs: [publish-amd64, publish-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-arm64
      sbom-artifact-name: sbom-midnight-node-arm64
      platform: linux/arm64
      skip-attestation: true
    secrets: inherit

  sbom-scan-toolkit-amd64:
    name: SBOM/Scan Toolkit (amd64)
    needs: [publish-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-amd64
      sbom-artifact-name: sbom-midnight-node-toolkit-amd64
      skip-attestation: true
    secrets: inherit

  sbom-scan-toolkit-arm64:
    name: SBOM/Scan Toolkit (arm64)
    needs: [publish-amd64, publish-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-arm64
      sbom-artifact-name: sbom-midnight-node-toolkit-arm64
      platform: linux/arm64
      skip-attestation: true
    secrets: inherit

  publish-multi-arch:
    name: Publish multi-arch image
    runs-on: ubuntu-latest
    needs: [publish-amd64, publish-arm64, sbom-scan-node-amd64, sbom-scan-node-arm64, sbom-scan-toolkit-amd64, sbom-scan-toolkit-arm64]
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write  # Required for GitHub native attestations
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Checkout node repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: true

      - name: Create and push Docker manifest (GHCR)
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          echo "Creating manifests for node/toolkit with tags: $IMAGE_TAG"

          # Multi-arch node image
          docker manifest create "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}" \
            "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64" \
            "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64"

          # Toolkit manifests
          docker manifest create "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}" \
            "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64" \
            "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64"

          # Push node manifests
          docker manifest push "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}"
          docker manifest push "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}"

      - name: Get multi-arch manifest digests (GHCR)
        id: ghcr-digests
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest node multi-arch manifest (GHCR)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node
          subject-digest: ${{ steps.ghcr-digests.outputs.node }}

      - name: Attest toolkit multi-arch manifest (GHCR)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnight-ntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.ghcr-digests.outputs.toolkit }}

      - name: Mirror arch-specific images to midnightntwrk (GHCR)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          # Needed only for older branches where Earthly is not pushing to midnightntwrk
          for IMAGE in midnight-node midnight-node-toolkit; do
            for ARCH in amd64 arm64; do
              SRC="ghcr.io/midnight-ntwrk/${IMAGE}:${IMAGE_TAG}-${ARCH}"
              DST="ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-${ARCH}"
              if docker buildx imagetools inspect "$DST" > /dev/null 2>&1; then
                echo "${DST} already exists, skipping"
              else
                echo "Mirroring ${SRC} -> ${DST}"
                docker pull --platform "linux/${ARCH}" "$SRC"
                docker tag "$SRC" "$DST"
                docker push "$DST"
              fi
            done
          done

      - name: Create commit-tagged multi-arch images (GHCR midnightntwrk)
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          for IMAGE in midnight-node midnight-node-toolkit; do
            # Arch-specific images already pushed by Earthly; create multi-arch manifest
            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"
          done

      - name: Get commit-tagged multi-arch digests (GHCR midnightntwrk)
        id: midnightntwrk-digests
        env:
          IMAGE_TAG: ${{ needs.publish-amd64.outputs.IMAGE_TAG }}
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest node commit-tagged image (GHCR midnightntwrk)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.midnightntwrk-digests.outputs.node }}

      - name: Attest toolkit commit-tagged image (GHCR midnightntwrk)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.midnightntwrk-digests.outputs.toolkit }}



      - name: Create and push `latest-main` images (GHCR)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          docker manifest create "ghcr.io/midnight-ntwrk/midnight-node:latest-main" \
            "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64" \
            "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64"

          docker manifest create "ghcr.io/midnight-ntwrk/midnight-node-toolkit:latest-main" \
            "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64" \
            "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64"

          docker manifest push "ghcr.io/midnight-ntwrk/midnight-node:latest-main"
          docker manifest push "ghcr.io/midnight-ntwrk/midnight-node-toolkit:latest-main"

      - name: Create `latest-main` images (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          for IMAGE in midnight-node midnight-node-toolkit; do
            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main-amd64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-amd64"

            docker buildx imagetools create \
              --tag "ghcr.io/midnightntwrk/${IMAGE}:latest-main-arm64" \
              "ghcr.io/midnightntwrk/${IMAGE}:${IMAGE_TAG}-arm64"
          done

      - name: Create and push `latest-main` images (Docker Hub)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        run: |
          export IMAGE_TAG="${{ needs.publish-amd64.outputs.IMAGE_TAG }}"

          echo "Creating manifests for node/toolkit from $IMAGE_TAG images"
          docker pull "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-amd64"
          docker pull "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-arm64"
          docker pull "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64"
          docker pull "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64"

          echo "Tagging each image with 'latest-main'"
          docker tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-amd64" "midnightntwrk/midnight-node:latest-main-amd64"
          docker tag "ghcr.io/midnightntwrk/midnight-node:${IMAGE_TAG}-arm64" "midnightntwrk/midnight-node:latest-main-arm64"
          docker tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64" "midnightntwrk/midnight-node-toolkit:latest-main-amd64"
          docker tag "ghcr.io/midnightntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64" "midnightntwrk/midnight-node-toolkit:latest-main-arm64"

          echo "Push 'latest-main' images to Docker Hub"
          docker push midnightntwrk/midnight-node:latest-main-amd64
          docker push midnightntwrk/midnight-node:latest-main-arm64
          docker push midnightntwrk/midnight-node-toolkit:latest-main-amd64
          docker push midnightntwrk/midnight-node-toolkit:latest-main-arm64

          echo "Create multi-arch manifests for Docker Hub"
          docker manifest create midnightntwrk/midnight-node:latest-main \
            midnightntwrk/midnight-node:latest-main-amd64 \
            midnightntwrk/midnight-node:latest-main-arm64

          docker manifest create midnightntwrk/midnight-node-toolkit:latest-main \
            midnightntwrk/midnight-node-toolkit:latest-main-amd64 \
            midnightntwrk/midnight-node-toolkit:latest-main-arm64

          echo "Push manifests to Docker Hub"
          docker manifest push midnightntwrk/midnight-node:latest-main
          docker manifest push midnightntwrk/midnight-node-toolkit:latest-main

      - name: Get Docker Hub image digests (latest-main)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        id: dockerhub-digests
        run: |
          # Arch-specific digests
          NODE_AMD64=$(docker buildx imagetools inspect "midnightntwrk/midnight-node:latest-main-amd64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node-amd64=${NODE_AMD64}" >> "$GITHUB_OUTPUT"
          NODE_ARM64=$(docker buildx imagetools inspect "midnightntwrk/midnight-node:latest-main-arm64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node-arm64=${NODE_ARM64}" >> "$GITHUB_OUTPUT"
          TOOLKIT_AMD64=$(docker buildx imagetools inspect "midnightntwrk/midnight-node-toolkit:latest-main-amd64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit-amd64=${TOOLKIT_AMD64}" >> "$GITHUB_OUTPUT"
          TOOLKIT_ARM64=$(docker buildx imagetools inspect "midnightntwrk/midnight-node-toolkit:latest-main-arm64" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit-arm64=${TOOLKIT_ARM64}" >> "$GITHUB_OUTPUT"

          # Multi-arch manifest digests
          NODE_MULTI=$(docker buildx imagetools inspect "midnightntwrk/midnight-node:latest-main" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node-multi=${NODE_MULTI}" >> "$GITHUB_OUTPUT"
          TOOLKIT_MULTI=$(docker buildx imagetools inspect "midnightntwrk/midnight-node-toolkit:latest-main" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit-multi=${TOOLKIT_MULTI}" >> "$GITHUB_OUTPUT"

      - name: Attest Docker Hub node image (amd64)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.dockerhub-digests.outputs.node-amd64 }}

      - name: Attest Docker Hub node image (arm64)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.dockerhub-digests.outputs.node-arm64 }}

      - name: Attest Docker Hub toolkit image (amd64)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.dockerhub-digests.outputs.toolkit-amd64 }}

      - name: Attest Docker Hub toolkit image (arm64)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.dockerhub-digests.outputs.toolkit-arm64 }}

      - name: Attest Docker Hub node multi-arch manifest
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.dockerhub-digests.outputs.node-multi }}

      - name: Attest Docker Hub toolkit multi-arch manifest
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/midnightntwrk/midnight-node-toolkit
          subject-digest: ${{ steps.dockerhub-digests.outputs.toolkit-multi }}

      - name: Get `latest-main` digests (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        id: midnightntwrk-latest-digests
        run: |
          NODE_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node:latest-main" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "node=${NODE_DIGEST}" >> "$GITHUB_OUTPUT"
          TOOLKIT_DIGEST=$(docker buildx imagetools inspect "ghcr.io/midnightntwrk/midnight-node-toolkit:latest-main" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "toolkit=${TOOLKIT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest node `latest-main` image (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/midnightntwrk/midnight-node
          subject-digest: ${{ steps.midnightntwrk-latest-digests.outputs.node }}

      - name: Attest toolkit `latest-main` image (GHCR midnightntwrk)
        if: (github.event.inputs.branch || github.ref_name) == 'main'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
