name: Main - Toolkit and Node build/publish

on:
  push:
    branches: ["main", "release/*"]
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to build and deploy"
        required: false
        default: ""

# no top level default permissions for security reasons
permissions: {}

jobs:
  publish-amd64:
    name: AMD Build and Publish
    runs-on: ubuntu-latest-16-core-x64
    outputs:
      IMAGE_TAG: ${{ steps.export.outputs.IMAGE_TAG }}
    env:
      FORCE_COLOR: 1
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for keyless signing with Cosign
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Checkout Season action repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: midnightntwrk/season-action
          ref: 1666b2819e86ffd23f187a3e854e32311a768161 # 0.4.2
          path: season-action
          token: ${{ secrets.MIDNIGHTCI_REPO }}
          submodules: true

      - name: Setup Season
        uses: ./season-action
        with:
          ghcr_registry: ghcr.io/midnight-ntwrk
          ghcr_username: MidnightCI
          ghcr_password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          suffix: ${{ github.event.inputs.suffix }}
          tag_name: node
          image_name: midnight-node
          cargo_toml_path: node/Cargo.toml
          changes_archive_dir: .changes_archive

      - name: Install just
        uses: taiki-e/install-action@cfdb446e391c69574ebc316dfb7d7849ec12b940 #v2.68.8
        with:
          tool: just

      - name: Free disk space
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- "scripts/free-disk-space.sh"
          ./scripts/free-disk-space.sh

      - name: Run build
        id: export
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          # We don't use --ci as we want artifacts to be saved
          . ./.envrc && earthly -P --use-inline-cache --save-inline-cache --strict --push +node-image
          . ./.envrc && earthly --secret GITHUB_TOKEN="${{ secrets.MIDNIGHTCI_PACKAGES_READ }}" -P --ci --push +toolkit-image

          # Pass IMAGE_TAG to next step (must match definition in Earthfile):
          export IMAGE_TAG="$(cat node/Cargo.toml | grep "version =" | head -1 | awk '{print $3}' | tr -d '"')-$(git rev-parse --short=8 HEAD)"
          printf "IMAGE_TAG=%s\n" "${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Sign container images
        env:
          IMAGE_TAG: ${{ steps.export.outputs.IMAGE_TAG }}
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-amd64"
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-amd64"

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  #v6.0.0
        if: success() || failure()
        with:
          name: midnight-node-amd64
          path: artifacts-amd64/

      - name: Archive artifacts
        run: |
          tar -czf midnight-node-amd64.tar.gz -C artifacts-amd64 .
          echo "Created midnight-node-amd64.tar.gz"
          ls -lh midnight-node-amd64.tar.gz

      - name: Create or Update Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          # Build release notes
          export SEASON_GHCR_REGISTRY="midnightntwrk"
          export SEASON_VAR_NODE_DOCKER_IMAGE="$SEASON_GHCR_REGISTRY/$SEASON_IMAGE_NAME:$SEASON_IMAGE_TAG_COMMIT"
          export SEASON_VAR_TOOLKIT_DOCKER_IMAGE="$SEASON_GHCR_REGISTRY/midnight-node-toolkit:$SEASON_IMAGE_TAG_COMMIT"
          export SEASON_VAR_RELEASE_TAG="$SEASON_GIT_TAG"
          season-build-release-notes

          if [[ "$BRANCH" != "main" && ! "$BRANCH" =~ ^release/.* ]]; then
            echo "Branch \"$BRANCH\" is not \"main\" and does not start with \"release/\", skipping draft release creation for AMD64..."
            exit 0
          fi

          VERSION=$(cat node/Cargo.toml | grep "version =" | head -1 | awk '{print $3}' | tr -d '"')
          IMAGE_TAG_RELEASE="$VERSION"
          RELEASE_TITLE="[Unreleased]"

          if gh release view "$RELEASE_TITLE" --json isDraft | grep false; then
            echo "Release has already been published, skipping draft..."
            exit 0
          fi

          if gh release view "$RELEASE_TITLE"; then
            echo "Release already exists, modifying..."
            EDIT_OR_CREATE="edit"
          else
            echo "Creating release..."
            EDIT_OR_CREATE="create"
          fi

          gh release $EDIT_OR_CREATE "$RELEASE_TITLE" \
            --title "$RELEASE_TITLE" \
            --draft \
            --notes-file RELEASE_NOTES.md

          gh release upload "$RELEASE_TITLE" midnight-node-amd64.tar.gz --clobber

      - name: Archive release notes
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  publish-arm64:
    name: ARM Build and Publish
    runs-on: ubuntu-latest-8-core-arm64
    env:
      FORCE_COLOR: 1
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for keyless signing with Cosign
    steps:
      # QEMU is currently required as compactc doesn't have a linux arm64 build of compactc.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:1b804311fe87047a4c96d38b4b3ef6f62fca8cd125265917a9e3dc3c996c39e6 # latest
          platforms: "amd64"

      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Run Node and toolkit builds
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          # We don't pass --ci to earthly here as we want the artifacts saved
          . ./.envrc && earthly -P --use-inline-cache --save-inline-cache --strict --push +node-image
          . ./.envrc && earthly --secret GITHUB_TOKEN=${{ secrets.MIDNIGHTCI_PACKAGES_READ }} -P --ci --push +toolkit-image

      - name: Sign container images
        run: |
          git fetch origin "$GITHUB_REF" --depth=1
          git checkout FETCH_HEAD -- ".github/scripts/sign-image.sh"
          source .github/scripts/sign-image.sh

          # Calculate IMAGE_TAG (must match definition in Earthfile)
          IMAGE_TAG="$(cat node/Cargo.toml | grep "version =" | head -1 | awk '{print $3}' | tr -d '"')-$(git rev-parse --short=8 HEAD)"

          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node:${IMAGE_TAG}-arm64"
          sign_with_retry "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${IMAGE_TAG}-arm64"

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  #v6.0.0
        if: success() || failure()
        with:
          name: midnight-node-arm64
          path: artifacts-arm64/

      - name: Archive ARM artifacts
        run: |
          tar -czf midnight-node-arm64.tar.gz -C artifacts-arm64 .
          echo "Created midnight-node-arm64.tar.gz"
          ls -lh midnight-node-arm64.tar.gz


      - name: Create or Update Draft Release (ARM64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [[ "$BRANCH" != "main" && ! "$BRANCH" =~ ^release/.* ]]; then
            echo "Branch \"$BRANCH\" is not \"main\" and does not start with \"release/\", skipping draft release creation for ARM64..."
            exit 0
          fi

          RELEASE_TITLE="[Unreleased]"

          if gh release view "$RELEASE_TITLE" --json isDraft | grep false; then
            echo "Release has already been published, skipping draft..."
            exit 0
          fi

          echo "Uploading ARM64 artifacts..."
          gh release upload "$RELEASE_TITLE" midnight-node-arm64.tar.gz --clobber
          echo "ARM64 artifacts uploaded successfully."

  build-indexer-images:
    name: Build Indexer Images
    runs-on: ubuntu-latest-16-core-x64
    permissions:
      pull-requests: write
      packages: read
      contents: write
    outputs:
      INDEXER_IMAGE_TAG: ${{ steps.build_indexer.outputs.INDEXER_IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: true

      - name: Install just
        uses: taiki-e/install-action@cfdb446e391c69574ebc316dfb7d7849ec12b940 #v2.68.8
        with:
          tool: just

      - name: Build indexer images
        id: build_indexer
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          # Force AMD64 architecture for all builds
          export DOCKER_DEFAULT_PLATFORM=linux/amd64
          export DOCKER_BUILDKIT=1
          export BUILDX_PLATFORM=linux/amd64

          # Login to Docker once at the start
          echo "🔐 Logging into Docker..."
          echo ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }} | docker login ghcr.io -u MidnightCI --password-stdin

          pwd
          ls
          cd indexer
          ls
          . .envrc

          # Check available docker builders and platforms
          echo "Available docker builders:"
          docker buildx ls
          echo "Current platform: $(uname -m)"
          echo "DOCKER_DEFAULT_PLATFORM: $DOCKER_DEFAULT_PLATFORM"

          # Build with explicit AMD64 platform
          echo "🔧 Building indexer-api with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image indexer-api

          echo "🔧 Building chain-indexer with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image chain-indexer

          echo "🔧 Building wallet-indexer with AMD64 platform..."
          DOCKER_DEFAULT_PLATFORM=linux/amd64 just build-docker-image wallet-indexer

          # Retag images with main repo's commit hash (not submodule's)
          echo "🏷️ Retagging images with main repo commit hash..."

          # Get commit hashes before changing directories
          cd ..  # Go back to main repo directory
          MAIN_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Main repo commit: $MAIN_COMMIT"

          cd indexer
          SUBMODULE_COMMIT=$(git rev-parse --short=8 HEAD)
          echo "Submodule commit: $SUBMODULE_COMMIT"

          # Retag all indexer images
          echo "🏷️ Retagging images..."
          INDEXER_IMAGE_TAG="via-node-${MAIN_COMMIT}"
          docker tag ghcr.io/midnight-ntwrk/indexer-api:${SUBMODULE_COMMIT} ghcr.io/midnight-ntwrk/indexer-api:${INDEXER_IMAGE_TAG}
          docker tag ghcr.io/midnight-ntwrk/chain-indexer:${SUBMODULE_COMMIT} ghcr.io/midnight-ntwrk/chain-indexer:${INDEXER_IMAGE_TAG}
          docker tag ghcr.io/midnight-ntwrk/wallet-indexer:${SUBMODULE_COMMIT} ghcr.io/midnight-ntwrk/wallet-indexer:${INDEXER_IMAGE_TAG}

          # Push the new tags
          echo "📤 Pushing retagged images..."
          docker push ghcr.io/midnight-ntwrk/indexer-api:${INDEXER_IMAGE_TAG}
          docker push ghcr.io/midnight-ntwrk/chain-indexer:${INDEXER_IMAGE_TAG}
          docker push ghcr.io/midnight-ntwrk/wallet-indexer:${INDEXER_IMAGE_TAG}

          echo "INDEXER_IMAGE_TAG=${INDEXER_IMAGE_TAG}" >> $GITHUB_OUTPUT

          echo "✅ Images retagged and pushed successfully!"

  sbom-scan-node-amd64:
    name: SBOM/Scan Node (amd64)
    needs: [publish-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-amd64
      sbom-artifact-name: sbom-midnight-node-amd64
    secrets: inherit

  sbom-scan-node-arm64:
    name: SBOM/Scan Node (arm64)
    needs: [publish-amd64, publish-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-arm64
      sbom-artifact-name: sbom-midnight-node-arm64
    secrets: inherit

  sbom-scan-toolkit-amd64:
    name: SBOM/Scan Toolkit (amd64)
    needs: [publish-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-amd64
      sbom-artifact-name: sbom-midnight-node-toolkit-amd64
    secrets: inherit

  sbom-scan-toolkit-arm64:
    name: SBOM/Scan Toolkit (arm64)
    needs: [publish-amd64, publish-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node-toolkit:${{ needs.publish-amd64.outputs.IMAGE_TAG }}-arm64
      sbom-artifact-name: sbom-midnight-node-toolkit-arm64
    secrets: inherit

